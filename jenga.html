<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jenga 3D — Samuel OS</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; touch-action:none; }
canvas { display:block; position:fixed; top:0; left:0; z-index:1; }

/* ── OVERLAY DE INICIO ── */
#overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(15,23,42,0.93);
  display:flex; align-items:center; justify-content:center;
}
.ov-card {
  background:#1e293b; border-radius:26px; padding:36px 28px;
  width:min(400px,92vw); text-align:center;
  border:2px solid rgba(255,255,255,.1);
}
.ov-emoji { font-size:3.5rem; margin-bottom:8px; }
.ov-title { font-size:2rem; font-weight:900; color:#f8fafc; margin-bottom:4px; }
.ov-sub   { color:#94a3b8; font-size:1rem; margin-bottom:28px; line-height:1.5; }
.player-row { display:flex; flex-direction:column; gap:14px; margin-bottom:28px; }
.player-wrap { display:flex; align-items:center; gap:12px; }
.p-dot { width:20px; height:20px; border-radius:50%; flex-shrink:0; }
.p-input {
  flex:1; padding:13px 16px; border-radius:13px;
  border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.07); color:#f8fafc;
  font-size:1.05rem; font-weight:700; outline:none;
  transition:border-color .2s;
}
.p-input:focus { border-color:#f59e0b; }
.btn-start {
  width:100%; padding:17px; border-radius:15px; border:none;
  background:#f59e0b; color:#1c1917;
  font-size:1.25rem; font-weight:900; cursor:pointer;
  transition:transform .12s, box-shadow .12s;
  box-shadow:0 4px 18px rgba(245,158,11,.35);
}
.btn-start:active { transform:scale(.97); }

/* ── HUD SUPERIOR ── */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:100;
  padding:14px 16px; display:none;
  align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(15,23,42,.92) 0%,transparent 100%);
  pointer-events:none;
}
#hud.vis { display:flex; }
#hud > * { pointer-events:all; }
#btnBack {
  padding:11px 20px; border-radius:13px;
  border:2px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1); color:#f8fafc;
  font-size:1rem; font-weight:800; cursor:pointer;
}
#btnBack:active { background:rgba(255,255,255,.2); }
#turnBadge {
  padding:11px 22px; border-radius:13px;
  font-size:1rem; font-weight:900; color:#1c1917;
  background:#f59e0b; max-width:180px; text-align:center;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  transition:background .3s;
}

/* ── CONTROLES CÁMARA ── */
#camBtns {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  z-index:100; display:none; gap:14px; align-items:center;
}
#camBtns.vis { display:flex; }
.cam-btn {
  width:62px; height:62px; border-radius:50%; border:none;
  background:rgba(255,255,255,.12); color:#f8fafc;
  font-size:1.6rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.cam-btn:active { background:rgba(255,255,255,.22); }

/* ── BOTONES DE ACCIÓN (bloque seleccionado) ── */
#actionBtns {
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  z-index:100; display:none; gap:10px; align-items:center;
}
#actionBtns.vis { display:flex; }
.ab {
  padding:14px 18px; border-radius:14px; border:none;
  font-size:1rem; font-weight:900; cursor:pointer;
  transition:transform .1s;
}
.ab:active { transform:scale(.95); }
#btnSlideL, #btnSlideR { background:#f59e0b; color:#1c1917; }
#btnCancel { background:rgba(255,255,255,.15); color:#f8fafc; }

/* ── PONER ARRIBA ── */
#placeBtn {
  position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
  z-index:100; display:none;
}
#placeBtn.vis { display:block; }
#btnPlace {
  padding:16px 36px; border-radius:15px; border:none;
  background:#22c55e; color:#fff;
  font-size:1.15rem; font-weight:900; cursor:pointer;
  box-shadow:0 4px 18px rgba(34,197,94,.35);
}

/* ── HINT ── */
#hint {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  z-index:100; display:none; background:rgba(15,23,42,.85);
  color:#94a3b8; padding:8px 20px; border-radius:99px;
  font-size:.9rem; font-weight:600; white-space:nowrap;
  pointer-events:none;
}
#hint.vis { display:block; }

/* ── GAME OVER ── */
#gameOver {
  position:fixed; inset:0; z-index:300;
  background:rgba(15,23,42,.92);
  display:none; align-items:center; justify-content:center;
}
#gameOver.vis { display:flex; }
.go-card {
  background:#1e293b; border-radius:26px; padding:44px 32px;
  text-align:center; border:2px solid rgba(255,255,255,.1);
  width:min(360px,88vw);
}
.go-emoji  { font-size:4rem; margin-bottom:10px; }
.go-title  { font-size:1.9rem; font-weight:900; color:#f8fafc; margin-bottom:8px; }
.go-sub    { color:#94a3b8; font-size:1rem; margin-bottom:30px; }
.btn-restart {
  padding:15px 36px; border-radius:14px; border:none;
  background:#f59e0b; color:#1c1917;
  font-size:1.1rem; font-weight:900; cursor:pointer;
}
</style>
</head>
<body>

<!-- ══ OVERLAY INICIO ═══════════════════════════════════════ -->
<div id="overlay">
  <div class="ov-card">
    <div class="ov-emoji">🏗️</div>
    <div class="ov-title">Jenga 3D</div>
    <div class="ov-sub">Por turnos — sacá un bloque sin tirar la torre</div>
    <div class="player-row">
      <div class="player-wrap">
        <div class="p-dot" style="background:#f59e0b"></div>
        <input class="p-input" id="p1" type="text" placeholder="Jugador 1" value="Samuel" maxlength="12">
      </div>
      <div class="player-wrap">
        <div class="p-dot" style="background:#38bdf8"></div>
        <input class="p-input" id="p2" type="text" placeholder="Jugador 2" value="Jugador 2" maxlength="12">
      </div>
    </div>
    <button class="btn-start" id="btnStart">▶ ¡Empezar!</button>
  </div>
</div>

<!-- ══ HUD ═══════════════════════════════════════════════════ -->
<div id="hud">
  <button id="btnBack">⬅ Volver</button>
  <div id="turnBadge">—</div>
</div>

<!-- ══ HINT ══════════════════════════════════════════════════ -->
<div id="hint">Tocá un bloque para sacarlo</div>

<!-- ══ BOTONES ACCIÓN ════════════════════════════════════════ -->
<div id="actionBtns">
  <button class="ab" id="btnSlideL">◀ Sacar</button>
  <button class="ab" id="btnCancel">✕</button>
  <button class="ab" id="btnSlideR">Sacar ▶</button>
</div>

<!-- ══ PONER ARRIBA ══════════════════════════════════════════ -->
<div id="placeBtn">
  <button id="btnPlace">⬆ Poner arriba</button>
</div>

<!-- ══ CÁMARA CONTROLES ═══════════════════════════════════════ -->
<div id="camBtns">
  <button class="cam-btn" id="btnRotL">◀</button>
  <button class="cam-btn" id="btnRotR">▶</button>
</div>

<!-- ══ GAME OVER ══════════════════════════════════════════════ -->
<div id="gameOver">
  <div class="go-card">
    <div class="go-emoji">💥</div>
    <div class="go-title" id="goTitle">¡Se cayó la torre!</div>
    <div class="go-sub"   id="goSub">—</div>
    <button class="btn-restart" id="btnRestart">🔄 Jugar de nuevo</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   JENGA 3D — LOTE 2: Interacción + turnos
   Three.js r128, animaciones manuales, sin física externa
   ============================================================ */

/* ── CONSTANTES ──────────────────────────────────────────── */
const BL = 1.5, BW = 0.5, BH = 0.3;
const LAYERS   = 18;
const WOOD_COLORS = [0xC8A070, 0xB8904A, 0xD4B480, 0xA07838, 0xCC9E62];
const CAM_RADIUS  = 9;
const CAM_HEIGHT  = 4.2;

/* ── ESCENA ──────────────────────────────────────────────── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);
scene.fog = new THREE.FogExp2(0x0f172a, 0.04);

/* ── CÁMARA ──────────────────────────────────────────────── */
let topLayer = LAYERS - 1;  // se actualiza al colocar bloques arriba
const CAM_TARGET = new THREE.Vector3(0, LAYERS * BH / 2, 0);
const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
let camAngle = 0.3;

function positionCamera() {
  camera.position.set(
    CAM_RADIUS * Math.sin(camAngle),
    CAM_HEIGHT,
    CAM_RADIUS * Math.cos(camAngle)
  );
  camera.lookAt(new THREE.Vector3(0, (topLayer + 1) * BH / 2, 0));
}
positionCamera();

/* ── RENDERER ────────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ── LUCES ───────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0xfff8e0, 0.55));

const sun = new THREE.DirectionalLight(0xfffaf0, 1.5);
sun.position.set(6, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left   = -5;  sun.shadow.camera.right  = 5;
sun.shadow.camera.top    = 15;  sun.shadow.camera.bottom = -2;
sun.shadow.camera.near   = 0.5; sun.shadow.camera.far    = 40;
sun.shadow.bias = -0.001;
scene.add(sun);

scene.add(Object.assign(new THREE.DirectionalLight(0x8ab4f8, 0.35), {
  position: new THREE.Vector3(-6, 4, -4)
}));

/* ── MESA ────────────────────────────────────────────────── */
const table = new THREE.Mesh(
  new THREE.CylinderGeometry(2.5, 2.5, 0.12, 48),
  new THREE.MeshLambertMaterial({ color: 0x334155 })
);
table.position.y = -0.06;
table.receiveShadow = true;
scene.add(table);

const rim = new THREE.Mesh(
  new THREE.TorusGeometry(2.5, 0.06, 8, 48),
  new THREE.MeshLambertMaterial({ color: 0x475569 })
);
rim.rotation.x = Math.PI / 2;
scene.add(rim);

/* ── BLOQUES ─────────────────────────────────────────────── */
const blockMeshes = [];
const sharedBlockGeo = new THREE.BoxGeometry(BL, BH, BW);
const sharedEdgeGeo  = new THREE.EdgesGeometry(sharedBlockGeo);

function makeBlock(x, y, z, rotY, layer, pos) {
  const col = WOOD_COLORS[Math.floor(Math.random() * WOOD_COLORS.length)];
  const mat = new THREE.MeshLambertMaterial({ color: col });
  const mesh = new THREE.Mesh(sharedBlockGeo, mat);

  mesh.add(new THREE.LineSegments(
    sharedEdgeGeo,
    new THREE.LineBasicMaterial({ color: 0x78350f, transparent: true, opacity: 0.45 })
  ));

  mesh.castShadow = mesh.receiveShadow = true;
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY;
  mesh.userData = { layer, pos, removed: false, baseColor: col };
  scene.add(mesh);
  blockMeshes.push(mesh);
  return mesh;
}

function buildTower() {
  for (let l = 0; l < LAYERS; l++) {
    const y = BH / 2 + l * BH;
    const even = l % 2 === 0;
    for (let i = 0; i < 3; i++) {
      const off = (i - 1) * BW;
      even ? makeBlock(0, y, off, 0, l, i)
           : makeBlock(off, y, 0, Math.PI / 2, l, i);
    }
  }
}
buildTower();

/* ── RAYCASTING ──────────────────────────────────────────── */
const raycaster = new THREE.Raycaster();

function ndc(clientX, clientY) {
  return new THREE.Vector2(
    (clientX / innerWidth) * 2 - 1,
    -(clientY / innerHeight) * 2 + 1
  );
}

function pickBlock(cx, cy) {
  raycaster.setFromCamera(ndc(cx, cy), camera);
  const alive = blockMeshes.filter(b => !b.userData.removed);
  const hits  = raycaster.intersectObjects(alive, false);
  return hits.length ? hits[0].object : null;
}

/* ── ESTADO ──────────────────────────────────────────────── */
let players       = ['Samuel', 'Jugador 2'];
let currentPlayer = 0;
let selectedBlock = null;
let removedBlock  = null;  // bloque fuera de la torre, esperando ser colocado arriba
let isAnimating   = false;
let gameActive    = false;

/* ── HELPERS ─────────────────────────────────────────────── */
function getHighestActiveLayer() {
  for (let l = topLayer + 10; l >= 0; l--) {
    if (blockMeshes.some(b => b.userData.layer === l && !b.userData.removed)) return l;
  }
  return 0;
}

function layerCount(l) {
  return blockMeshes.filter(b => b.userData.layer === l && !b.userData.removed).length;
}

function canSelect(mesh) {
  if (!gameActive || isAnimating || removedBlock) return false;
  if (mesh.userData.removed) return false;
  const l = mesh.userData.layer;
  const highest = getHighestActiveLayer();
  if (l >= highest - 1) return false;             // top 2 capas intocables
  if (layerCount(l) === 1) {                       // última pieza de la capa
    if (blockMeshes.some(b => b.userData.layer > l && !b.userData.removed)) return false;
  }
  return true;
}

/* ── SPEECH ──────────────────────────────────────────────── */
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-AR'; u.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ── SELECCIÓN ───────────────────────────────────────────── */
function selectBlock(mesh) {
  if (selectedBlock) deselectBlock();
  selectedBlock = mesh;
  mesh.material.emissive = new THREE.Color(0xf59e0b);
  mesh.material.emissiveIntensity = 0.45;
  document.getElementById('actionBtns').classList.add('vis');
  document.getElementById('hint').classList.remove('vis');
  speak('Buena elección. ¿Por dónde lo sacás?');
}

function deselectBlock() {
  if (!selectedBlock) return;
  selectedBlock.material.emissive.set(0x000000);
  selectedBlock.material.emissiveIntensity = 0;
  selectedBlock = null;
  document.getElementById('actionBtns').classList.remove('vis');
  showHint('Tocá un bloque para sacarlo');
}

/* ── HINT ────────────────────────────────────────────────── */
function showHint(msg) {
  const el = document.getElementById('hint');
  el.textContent = msg;
  el.classList.add('vis');
}
function hideHint() { document.getElementById('hint').classList.remove('vis'); }

/* ── ANIMACIÓN LERP ──────────────────────────────────────── */
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

function animatePos(mesh, targetPos, targetRotY, durationMs, onDone) {
  const startPos  = mesh.position.clone();
  const startRotY = mesh.rotation.y;
  const t0 = performance.now();

  function step() {
    const raw = Math.min((performance.now() - t0) / durationMs, 1);
    const t   = easeInOut(raw);
    mesh.position.lerpVectors(startPos, targetPos, t);
    mesh.rotation.y = lerp(startRotY, targetRotY, t);
    if (raw < 1) requestAnimationFrame(step);
    else { mesh.position.copy(targetPos); mesh.rotation.y = targetRotY; onDone && onDone(); }
  }
  requestAnimationFrame(step);
}

/* ── SACAR BLOQUE ────────────────────────────────────────── */
function slideOut(sign) {
  if (!selectedBlock || isAnimating) return;
  isAnimating = true;
  document.getElementById('actionBtns').classList.remove('vis');
  hideHint();

  const mesh = selectedBlock;
  selectedBlock = null;

  const even    = mesh.userData.layer % 2 === 0;
  const axis    = even ? 'x' : 'z';
  const target  = mesh.position.clone();
  target[axis] += sign * 4;

  animatePos(mesh, target, mesh.rotation.y, 380, () => {
    mesh.userData.removed = true;
    removedBlock = mesh;
    isAnimating  = false;

    if (!checkStability()) {
      triggerGameOver();
    } else {
      showHint(`Ahora poné el bloque arriba`);
      document.getElementById('placeBtn').classList.add('vis');
      speak('¡Bien! Ahora poné el bloque arriba.');
    }
  });
}

/* ── ESTABILIDAD ─────────────────────────────────────────── */
function checkStability() {
  const highest = getHighestActiveLayer();
  for (let l = 0; l < highest; l++) {
    if (layerCount(l) === 0) return false;
  }
  return true;
}

/* ── COLOCAR ARRIBA ──────────────────────────────────────── */
function placeOnTop() {
  if (!removedBlock || isAnimating) return;
  isAnimating = true;
  document.getElementById('placeBtn').classList.remove('vis');
  hideHint();

  const mesh     = removedBlock;
  const newLayer = getHighestActiveLayer() + 1;
  const even     = newLayer % 2 === 0;
  const y        = BH / 2 + newLayer * BH;
  const targetPos  = new THREE.Vector3(0, y, 0);
  const targetRotY = even ? 0 : Math.PI / 2;

  // Actualizar metadata
  mesh.userData.removed = false;
  mesh.userData.layer   = newLayer;
  mesh.userData.pos     = 1;

  animatePos(mesh, targetPos, targetRotY, 500, () => {
    if (newLayer > topLayer) topLayer = newLayer;
    positionCamera();
    removedBlock = null;
    isAnimating  = false;
    nextTurn();
  });
}

/* ── TURNO ───────────────────────────────────────────────── */
function updateTurnBadge() {
  const badge = document.getElementById('turnBadge');
  badge.textContent = `Turno de ${players[currentPlayer]}`;
  badge.style.background = currentPlayer === 0 ? '#f59e0b' : '#38bdf8';
  badge.style.color      = '#1c1917';
}

function nextTurn() {
  currentPlayer = 1 - currentPlayer;
  updateTurnBadge();
  showHint('Tocá un bloque para sacarlo');
  speak(`Turno de ${players[currentPlayer]}`);
}

/* ── GAME OVER ───────────────────────────────────────────── */
function triggerGameOver() {
  gameActive = false;
  hideHint();
  document.getElementById('actionBtns').classList.remove('vis');
  document.getElementById('placeBtn').classList.remove('vis');
  shakeTower(() => {
    const loser = players[currentPlayer];
    document.getElementById('goTitle').textContent = '¡Se cayó la torre!';
    document.getElementById('goSub').textContent   = `Perdió ${loser}`;
    document.getElementById('gameOver').classList.add('vis');
    speak(`¡Se cayó la torre! Perdió ${loser}.`);
  });
}

function shakeTower(cb) {
  const alive   = blockMeshes.filter(b => !b.userData.removed);
  const origins = alive.map(b => b.position.clone());
  const t0      = performance.now();
  const DUR     = 700;

  function step() {
    const t = (performance.now() - t0) / DUR;
    if (t < 1) {
      const amp = Math.sin(t * Math.PI) * 0.18;
      alive.forEach((b, i) => {
        b.position.x = origins[i].x + (Math.random() - 0.5) * amp;
        b.position.z = origins[i].z + (Math.random() - 0.5) * amp;
        b.position.y = origins[i].y - Math.max(0, t - 0.5) * 2 * (origins[i].y + 0.5);
      });
      requestAnimationFrame(step);
    } else {
      if (cb) cb();
    }
  }
  requestAnimationFrame(step);
}

/* ── CONTROLES CÁMARA ────────────────────────────────────── */
const ROT_STEP = Math.PI / 8;
document.getElementById('btnRotL').addEventListener('click', () => { camAngle -= ROT_STEP; positionCamera(); });
document.getElementById('btnRotR').addEventListener('click', () => { camAngle += ROT_STEP; positionCamera(); });

// Touch: distinguir tap vs swipe
let touchStartX = 0, touchStartY = 0, touchMoved = false;

renderer.domElement.addEventListener('touchstart', e => {
  touchMoved = false;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

renderer.domElement.addEventListener('touchmove', e => {
  if (e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) touchMoved = true;
  if (touchMoved) {
    camAngle -= dx * 0.004;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    positionCamera();
  }
}, { passive: true });

renderer.domElement.addEventListener('touchend', e => {
  if (touchMoved) return;
  if (!gameActive || isAnimating || removedBlock) return;
  const t   = e.changedTouches[0];
  const hit = pickBlock(t.clientX, t.clientY);
  if (!hit) { deselectBlock(); return; }
  if (hit === selectedBlock) { deselectBlock(); return; }
  if (canSelect(hit)) selectBlock(hit);
  else speak('Ese bloque no se puede sacar.');
});

// Mouse: distinguir clic vs drag
let mouseDown = false, mouseDownX = 0, mouseDownY = 0, lastMouseX = 0;
renderer.domElement.addEventListener('mousedown', e => {
  mouseDown = true;
  mouseDownX = lastMouseX = e.clientX;
  mouseDownY = e.clientY;
});
window.addEventListener('mouseup', () => { mouseDown = false; });
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  camAngle -= (e.clientX - lastMouseX) * 0.005;
  lastMouseX = e.clientX;
  positionCamera();
});
renderer.domElement.addEventListener('click', e => {
  const moved = Math.abs(e.clientX - mouseDownX) + Math.abs(e.clientY - mouseDownY);
  if (moved > 6) return;
  if (!gameActive || isAnimating || removedBlock) return;
  const hit = pickBlock(e.clientX, e.clientY);
  if (!hit) { deselectBlock(); return; }
  if (hit === selectedBlock) { deselectBlock(); return; }
  if (canSelect(hit)) selectBlock(hit);
  else speak('Ese bloque no se puede sacar.');
});

/* ── BOTONES ACCIÓN ──────────────────────────────────────── */
document.getElementById('btnSlideL').addEventListener('click', () => slideOut(-1));
document.getElementById('btnSlideR').addEventListener('click', () => slideOut(+1));
document.getElementById('btnCancel').addEventListener('click', deselectBlock);
document.getElementById('btnPlace').addEventListener('click', placeOnTop);

/* ── INICIO ──────────────────────────────────────────────── */
document.getElementById('btnStart').addEventListener('click', () => {
  players[0] = document.getElementById('p1').value.trim() || 'Samuel';
  players[1] = document.getElementById('p2').value.trim() || 'Jugador 2';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('hud').classList.add('vis');
  document.getElementById('camBtns').classList.add('vis');
  gameActive = true;
  updateTurnBadge();
  showHint('Tocá un bloque para sacarlo');
  speak(`Empieza ${players[0]}. Sacá un bloque.`);
});

document.getElementById('btnBack').addEventListener('click', () => {
  window.location.href = 'juegos.html';
});
document.getElementById('btnRestart').addEventListener('click', () => {
  window.location.reload();
});

/* ── RESIZE ──────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── LOOP ────────────────────────────────────────────────── */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
