<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Mundo de Samuel</title>
  <style>
    :root{
      --bg:#f2f5f8;
      --card:#ffffff;
      --stroke:#e5e7eb;
      --shadow: 0 16px 34px rgba(2,6,23,.14);
      --blue:#2563eb;
      --text:#0f172a;
      --muted:#475569;
      --ok:#16a34a;
      --warn:#f59e0b;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial; background:var(--bg); color:var(--text);}
    .shell{max-width:1120px;margin:0 auto;padding:18px 18px 26px;}

    header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .brand{display:flex;align-items:center;gap:14px;}
    .avatar{width:64px;height:64px;border-radius:999px;background:#fff;border:2px solid var(--stroke);box-shadow:0 10px 20px rgba(2,6,23,.08);overflow:hidden;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    h1{margin:0;font-size:26px;letter-spacing:-.02em;}
    .hint{margin-top:6px;color:var(--muted);font-weight:750;}

    #starsBadge{transition:transform .25s ease;}
    #starsBadge.pulse-stars{transform:scale(1.15);}

    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .btn{border:2px solid rgba(15,23,42,.12); background:#fff; padding:14px 18px; border-radius:16px; font-weight:900; cursor:pointer; text-decoration:none; color:var(--text); display:inline-flex; align-items:center; gap:10px; box-shadow:0 14px 28px rgba(2,6,23,.10); font-size:17px;}
    .btn.primary{background:var(--blue); color:#fff; border-color:transparent;}
    .btn.big{padding:18px 26px;border-radius:20px;font-size:20px;}
    .pill{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(15,23,42,.12);background:#fff;padding:10px 12px;border-radius:999px;font-weight:900;}

    /* Escenario del Mundo de Samuel (Fase 36: esqueleto, sin motor 3D todavía) */
    .mundo-stage{
      margin-top:18px;
      border-radius:24px;
      background:linear-gradient(180deg,#bfe3fb,#e0f2fe);
      border:2px solid rgba(15,23,42,.12);
      box-shadow:var(--shadow);
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    #mundoCanvas{ width:100%; height:100%; display:block; }
    .mundo-placeholder{ text-align:center; color:var(--muted); font-weight:800; padding:40px; }
    .mundo-placeholder .emoji{ font-size:64px; margin-bottom:10px; }

    .mundo-footer{ margin-top:16px; display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }

    .mundo-objetivo{ position:absolute; top:14px; left:14px; z-index:3; background:rgba(255,255,255,.92); }

    /* Controles táctiles grandes (Fase 38): mismo estilo que el Laberinto, para no aprender un botón nuevo */
    .mundo-controles{
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
      z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px;
      user-select:none; -webkit-user-select:none; touch-action:none;
    }
    .mundo-controles .fila{ display:flex; gap:12px; }
    .mundo-btn{
      border:none; border-radius:18px; min-width:64px; min-height:64px; font-size:26px;
      cursor:pointer; background:rgba(255,255,255,.88); box-shadow:0 10px 22px rgba(2,6,23,.22);
    }
    .mundo-btn:active{ background:#fff; transform:scale(.94); }
    @media (max-width:600px){
      .mundo-stage{ min-height:320px; }
      h1{ font-size:22px; }
      .mundo-btn{ min-width:56px; min-height:56px; font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="avatar"><img src="./samuel-avatar.png" alt="" /></div>
        <div>
          <h1>🌍 Mundo de Samuel</h1>
          <div class="hint">Caminá despacio y buscá las estrellas.</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill" id="starsBadge">⭐ 0</div>
      </div>
    </header>

    <div class="mundo-stage" id="mundoStage">
      <div class="mundo-placeholder" id="mundoPlaceholder">
        <div class="emoji">🌳</div>
        <div>El mundo se está preparando...</div>
      </div>
      <!-- Fase 37: el canvas de Three.js se agrega aquí dentro por JS -->

      <div class="pill mundo-objetivo" id="mundoObjetivo">🎯 Buscá las estrellas</div>

      <!-- Fase 38: controles táctiles grandes, mismo estilo que el Laberinto -->
      <div class="mundo-controles" id="mundoControles" aria-label="Controles para moverse">
        <button class="mundo-btn" id="mundoUp" aria-label="Arriba">⬆️</button>
        <div class="fila">
          <button class="mundo-btn" id="mundoLeft" aria-label="Izquierda">⬅️</button>
          <button class="mundo-btn" id="mundoDown" aria-label="Abajo">⬇️</button>
          <button class="mundo-btn" id="mundoRight" aria-label="Derecha">➡️</button>
        </div>
      </div>
    </div>

    <div class="mundo-footer">
      <a class="btn primary big" href="./juegos.html">⬅️ Volver</a>
      <button class="btn big" id="btnAyuda">🔊 Escuchar ayuda</button>
    </div>
  </div>

  <!--
    Fase 37: motor 3D con Three.js (cargado desde CDN, r128).
    El "Mundo de Samuel" es una escena propia y simplificada, escrita desde cero para esta app:
    NO se copió código del repo de referencia evaluado en la Fase 35
    (ashish0kumar/Minecraft-Javascript-Edition, licencia MIT) — solo se usó como referencia
    de qué es razonable hacer con Three.js puro, sin backend y sin build step.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // --- Estrellas compartidas con el resto de Samuel OS (mismo localStorage que juegos.html / child.html) ---
    function todayKeyM(){
      const d = new Date();
      return 'samuel_progress_' + d.toISOString().slice(0,10);
    }
    function loadProgressM(){
      try{
        const raw = localStorage.getItem(todayKeyM());
        if (!raw) return { stars:0, jugar:false, hablar:false, aprender:false };
        return JSON.parse(raw);
      }catch(e){
        return { stars:0, jugar:false, hablar:false, aprender:false };
      }
    }
    function updateStarsBadgeM(){
      const el = document.getElementById('starsBadge');
      if (!el) return;
      el.textContent = '⭐ ' + (loadProgressM().stars || 0);
    }
    updateStarsBadgeM();

    // --- Voz (igual que en juegos.html) ---
    function speak(text){
      try{
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices?.() || [];
        const es = voices.find(v => /es/i.test(v.lang)) || voices.find(v => /spanish/i.test(v.name)) || voices[0];
        if (es) u.voice = es;
        u.rate = 0.95;
        u.pitch = 1.05;
        u.volume = 1;
        window.speechSynthesis.speak(u);
      }catch(e){/* ignore */}
    }

    document.getElementById('btnAyuda').addEventListener('click', () => {
      speak('Samuel, caminá despacio y buscá las estrellas.');
    });

    // Mensaje de bienvenida al entrar a la pantalla
    setTimeout(() => speak('Samuel, caminá despacio y buscá las estrellas.'), 600);

    // --- Mundo de Samuel: escena 3D básica (Fase 37) ---
    // Mundo chico, tranquilo, sin enemigos, sin violencia, modo exploración únicamente.
    (function(){
      const stage = document.getElementById('mundoStage');
      const placeholder = document.getElementById('mundoPlaceholder');
      if (!stage) return;

      if (typeof THREE === 'undefined') {
        placeholder.innerHTML = '<div class="emoji">😴</div><div>El mundo 3D no se pudo cargar. Probá con internet conectado.</div>';
        return;
      }

      let renderer, scene, camera;
      let avatar, avatarShadow;
      const LIMITE = 13; // mundo chico: el personaje no puede salir de este cuadrado
      const VELOCIDAD = 4.2; // unidades por segundo: "caminar despacio"
      const teclas = {};
      const avatarPos = { x: 0, z: 4 };
      const camActual = new THREE.Vector3();
      const coleccionables = []; // estrellas y animales (Fase 39)
      const DISTANCIA_TOQUE = 1.15;

      // --- Audio propio del Mundo de Samuel (mismo estilo de síntesis que juegos.html) ---
      let audioCtxM = null;
      function ensureAudioM(){
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        if (!audioCtxM) audioCtxM = new AC();
        if (audioCtxM.state === 'suspended') audioCtxM.resume();
        return audioCtxM;
      }
      function playChimeM(f0, f1, dur){
        const ctx = ensureAudioM();
        if (!ctx) return;
        const t0 = ctx.currentTime + 0.02;
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(f0, t0);
        if (f1) o.frequency.exponentialRampToValueAtTime(f1, t0 + dur);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.9, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(ctx.destination);
        o.start(t0); o.stop(t0 + dur);
      }

      // --- Sonido ambiente (Fase 41): colchón muy suave + "viento" filtrado, en loop ---
      // Todo sintetizado (sin archivos de audio), igual filosofía que el resto de la app.
      let ambienteIniciadoM = false;
      function iniciarAmbienteM(){
        if (ambienteIniciadoM) return;
        const ctx = ensureAudioM();
        if (!ctx) return;
        ambienteIniciadoM = true;
        try{
          const master = ctx.createGain();
          master.gain.value = 0.05; // muy de fondo, no debe tapar la voz ni los chimes
          master.connect(ctx.destination);

          [220, 221.4].forEach((f) => {
            const o = ctx.createOscillator();
            o.type = 'sine';
            o.frequency.value = f;
            o.connect(master);
            o.start();
          });

          const bufferSize = 2 * ctx.sampleRate;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
          const viento = ctx.createBufferSource();
          viento.buffer = buffer;
          viento.loop = true;
          const filtro = ctx.createBiquadFilter();
          filtro.type = 'lowpass';
          filtro.frequency.value = 480;
          const ganViento = ctx.createGain();
          ganViento.gain.value = 0.045;
          viento.connect(filtro); filtro.connect(ganViento); ganViento.connect(ctx.destination);
          viento.start();
        }catch(e){ ambienteIniciadoM = false; }
      }

      // --- Estrellas reales de Samuel OS: mismo localStorage que juegos.html / child.html ---
      function saveProgressM(p){
        try{ localStorage.setItem(todayKeyM(), JSON.stringify(p)); }catch(e){/* ignore */}
      }
      function addTotalStarsM(n){
        try{
          const total = (parseInt(localStorage.getItem('samuel_total_stars') || '0', 10) || 0) + (n || 0);
          localStorage.setItem('samuel_total_stars', String(total));
        }catch(e){/* ignore */}
      }
      function addStarM(missionKey){
        const p = loadProgressM();
        p.stars = (p.stars || 0) + 1;
        p[missionKey || 'jugar'] = true;
        saveProgressM(p);
        addTotalStarsM(1);
        updateStarsBadgeM();
        const el = document.getElementById('starsBadge');
        if (el){ el.classList.remove('pulse-stars'); void el.offsetWidth; el.classList.add('pulse-stars'); }
      }

      function crearArbol(x, z){
        // Fase 41: copa en dos capas + tamaño variable, para que se distingan entre sí
        const grupo = new THREE.Group();
        const escala = 0.85 + Math.random() * 0.3;
        const tronco = new THREE.Mesh(
          new THREE.CylinderGeometry(0.25, 0.32, 1.4, 8),
          new THREE.MeshLambertMaterial({ color: 0x8a5a32 })
        );
        tronco.position.y = 0.7;
        const copaBase = new THREE.Mesh(
          new THREE.ConeGeometry(1.05, 1.5, 9),
          new THREE.MeshLambertMaterial({ color: 0x2f8f44 })
        );
        copaBase.position.y = 1.85;
        const copaArriba = new THREE.Mesh(
          new THREE.ConeGeometry(0.7, 1.15, 9),
          new THREE.MeshLambertMaterial({ color: 0x47b85b })
        );
        copaArriba.position.y = 2.7;
        grupo.add(tronco, copaBase, copaArriba);
        grupo.scale.set(escala, escala, escala);
        grupo.position.set(x, 0, z);
        return grupo;
      }

      function crearRoca(x, z, escala){
        const roca = new THREE.Mesh(
          new THREE.DodecahedronGeometry(0.5 * escala, 0),
          new THREE.MeshLambertMaterial({ color: 0x9aa3ad })
        );
        roca.position.set(x, 0.35 * escala, z);
        roca.rotation.set(Math.random(), Math.random(), Math.random());
        return roca;
      }

      // --- Vegetación chica del suelo (Fase 41): pasto y flores, solo decoración (no se tocan) ---
      function crearPasto(x, z){
        const mat = new THREE.MeshLambertMaterial({ color: 0x3fa34d });
        const tuft = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.26, 5), mat);
        tuft.position.set(x, 0.13, z);
        tuft.rotation.y = Math.random() * Math.PI;
        return tuft;
      }

      function crearFlor(x, z, color){
        const grupo = new THREE.Group();
        const tallo = new THREE.Mesh(
          new THREE.CylinderGeometry(0.025, 0.025, 0.22, 5),
          new THREE.MeshLambertMaterial({ color: 0x3fa34d })
        );
        tallo.position.y = 0.11;
        const flor = new THREE.Mesh(
          new THREE.SphereGeometry(0.07, 8, 6),
          new THREE.MeshBasicMaterial({ color })
        );
        flor.position.y = 0.24;
        grupo.add(tallo, flor);
        grupo.position.set(x, 0, z);
        return grupo;
      }

      // --- Cielo decorativo (Fase 41): nubes y sol, solo paisaje ---
      function crearNube(x, y, z){
        const grupo = new THREE.Group();
        const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        [[0,0,0,0.9],[0.7,0.08,0.1,0.7],[-0.7,0.05,-0.05,0.65],[0.2,0.18,0.2,0.55]].forEach(([dx,dy,dz,r]) => {
          const bola = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8), mat);
          bola.position.set(dx, dy, dz);
          grupo.add(bola);
        });
        grupo.position.set(x, y, z);
        grupo.scale.set(1.4, 1, 1.4);
        return grupo;
      }

      // --- Coleccionables (Fase 39): estrellas para juntar y animalitos para encontrar ---
      function crearEstrella(x, z){
        const forma = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.4, 0),
          new THREE.MeshLambertMaterial({ color: 0xfde047, emissive: 0xca8a04, emissiveIntensity: 0.35 })
        );
        forma.position.set(x, 0.95, z);
        return forma;
      }

      // --- Animales (Fase 41): formas simples pero distintas entre sí, para reconocerlos ---
      function crearPajarito(x, z, color){
        const grupo = new THREE.Group();
        const cuerpo = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 10), new THREE.MeshLambertMaterial({ color }));
        cuerpo.position.y = 0.4; cuerpo.scale.set(1, 0.95, 1.2);
        const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 10), new THREE.MeshLambertMaterial({ color }));
        cabeza.position.set(0, 0.62, 0.32);
        const pico = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.16, 6), new THREE.MeshLambertMaterial({ color: 0xf59e0b }));
        pico.rotation.x = Math.PI / 2; pico.position.set(0, 0.6, 0.48);
        [-1, 1].forEach((lado) => {
          const ala = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.32, 6), new THREE.MeshLambertMaterial({ color: 0x3b82c4 }));
          ala.rotation.z = lado * Math.PI / 2.4;
          ala.position.set(lado * 0.22, 0.45, -0.02);
          grupo.add(ala);
        });
        grupo.add(cuerpo, cabeza, pico);
        grupo.position.set(x, 0, z);
        return grupo;
      }

      function crearConejito(x, z, color){
        const grupo = new THREE.Group();
        const cuerpo = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 10), new THREE.MeshLambertMaterial({ color }));
        cuerpo.position.y = 0.32; cuerpo.scale.set(1, 0.9, 1.2);
        const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 10), new THREE.MeshLambertMaterial({ color }));
        cabeza.position.set(0, 0.56, 0.34);
        [-1, 1].forEach((lado) => {
          const oreja = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.06, 0.36, 6), new THREE.MeshLambertMaterial({ color }));
          oreja.position.set(lado * 0.1, 0.86, 0.3);
          oreja.rotation.z = lado * 0.12;
          grupo.add(oreja);
        });
        const cola = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        cola.position.set(0, 0.36, -0.36);
        grupo.add(cuerpo, cabeza, cola);
        grupo.position.set(x, 0, z);
        return grupo;
      }

      function crearMariposa(x, z, color){
        const grupo = new THREE.Group();
        const cuerpo = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), new THREE.MeshLambertMaterial({ color: 0x4b3621 }));
        cuerpo.rotation.x = Math.PI / 2;
        cuerpo.position.y = 0.55;
        const matAla = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
        [-1, 1].forEach((lado) => {
          const alaGrande = new THREE.Mesh(new THREE.CircleGeometry(0.26, 10), matAla);
          alaGrande.position.set(lado * 0.22, 0.62, 0);
          alaGrande.rotation.y = lado * 0.5;
          const alaChica = new THREE.Mesh(new THREE.CircleGeometry(0.16, 10), matAla);
          alaChica.position.set(lado * 0.16, 0.44, 0);
          alaChica.rotation.y = lado * 0.5;
          grupo.add(alaGrande, alaChica);
        });
        grupo.add(cuerpo);
        grupo.position.set(x, 0.25, z);
        return grupo;
      }

      function crearAnimal(tipo, x, z, color){
        if (tipo === 'pajarito') return crearPajarito(x, z, color);
        if (tipo === 'conejito') return crearConejito(x, z, color);
        if (tipo === 'mariposa') return crearMariposa(x, z, color);
        return crearPajarito(x, z, color);
      }

      function crearColeccionables(){
        const ESTRELLAS = [[-5,-3],[4,-4],[-2,5],[6,4],[-7,0],[2,1]];
        ESTRELLAS.forEach(([x,z]) => {
          const mesh = crearEstrella(x, z);
          scene.add(mesh);
          coleccionables.push({ mesh, x, z, tipo:'estrella', nombre:'una estrella', encontrado:false });
        });

        const ANIMALES = [
          [0,-7,  0x60a5fa, 'pajarito'],
          [-6,5,  0xf4a7c0, 'conejito'],
          [7,-2,  0xc084fc, 'mariposa']
        ];
        ANIMALES.forEach(([x,z,color,nombre]) => {
          const mesh = crearAnimal(nombre, x, z, color);
          scene.add(mesh);
          coleccionables.push({ mesh, x, z, tipo:'animal', nombre, encontrado:false });
        });

        actualizarObjetivoTexto();
      }

      function actualizarObjetivoTexto(){
        const el = document.getElementById('mundoObjetivo');
        if (!el) return;
        const total = coleccionables.length;
        const encontrados = coleccionables.filter(c => c.encontrado).length;
        el.textContent = '🎯 Encontrados: ' + encontrados + '/' + total;
      }

      let celebrandoRonda = false;
      function revisarColeccionables(){
        coleccionables.forEach((c) => {
          if (c.encontrado) return;
          const d = Math.hypot(avatarPos.x - c.x, avatarPos.z - c.z);
          if (d < DISTANCIA_TOQUE){
            c.encontrado = true;
            scene.remove(c.mesh);
            if (c.tipo === 'estrella'){
              playChimeM(523, 784, 0.35);
              speak('¡Muy bien, Samuel! Encontraste una estrella.');
            } else {
              playChimeM(392, 523, 0.3);
              speak('¡Encontraste al ' + c.nombre + '!');
            }
            addStarM('jugar');
            actualizarObjetivoTexto();
          }
        });
        if (!celebrandoRonda && coleccionables.length && coleccionables.every(c => c.encontrado)){
          celebrandoRonda = true;
          setTimeout(() => {
            speak('¡Encontraste todo, Samuel! Muy buen trabajo.');
            setTimeout(reaparecerColeccionables, 2600);
          }, 500);
        }
      }

      function reaparecerColeccionables(){
        coleccionables.forEach((c) => {
          c.encontrado = false;
          scene.add(c.mesh);
        });
        actualizarObjetivoTexto();
        celebrandoRonda = false;
      }

      // --- Personaje de Samuel (Fase 41): parecido simple a samuel-avatar.png ---
      // Pelo castaño, piel clara y buzo azul con cierre rojo, en formas simples (sin caras realistas).
      function crearAvatarSamuel(){
        const grupo = new THREE.Group();

        const cuerpo = new THREE.Mesh(
          new THREE.CylinderGeometry(0.32, 0.4, 0.6, 12),
          new THREE.MeshLambertMaterial({ color: 0x2f6fed }) // buzo azul
        );
        cuerpo.position.y = 0.42;

        const cierre = new THREE.Mesh(
          new THREE.CylinderGeometry(0.07, 0.07, 0.22, 8),
          new THREE.MeshLambertMaterial({ color: 0xe23b3b }) // detalle rojo del cuello
        );
        cierre.position.y = 0.64;

        const cabeza = new THREE.Mesh(
          new THREE.SphereGeometry(0.32, 16, 14),
          new THREE.MeshLambertMaterial({ color: 0xf0c39a }) // piel
        );
        cabeza.position.y = 0.95;

        const pelo = new THREE.Mesh(
          new THREE.SphereGeometry(0.34, 14, 10, 0, Math.PI * 2, 0, Math.PI * 0.6),
          new THREE.MeshLambertMaterial({ color: 0x6b4226 }) // pelo castaño
        );
        pelo.position.y = 1.04;

        grupo.add(cuerpo, cierre, cabeza, pelo);

        [[-0.13, 0.32], [0.13, 0.32]].forEach(([x, zOff]) => {
          const ojo = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), new THREE.MeshBasicMaterial({ color: 0x3a2415 }));
          ojo.position.set(x, 0.98, zOff);
          grupo.add(ojo);
        });
        [[-0.22, 0.24], [0.22, 0.24]].forEach(([x, zOff]) => {
          const mejilla = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshBasicMaterial({ color: 0xf6a9a0 }));
          mejilla.position.set(x, 0.88, zOff);
          grupo.add(mejilla);
        });

        return grupo;
      }

      function crearMundo(){
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbfe3fb);
        scene.fog = new THREE.Fog(0xbfe3fb, 18, 34);

        camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        stage.appendChild(renderer.domElement);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.inset = '0';

        // Luz suave, sin sombras duras (clima tranquilo)
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const luzSol = new THREE.DirectionalLight(0xfff4d6, 0.7);
        luzSol.position.set(8, 14, 6);
        scene.add(luzSol);

        // Suelo (mundo pequeño)
        const suelo = new THREE.Mesh(
          new THREE.PlaneGeometry(LIMITE * 2 + 4, LIMITE * 2 + 4),
          new THREE.MeshLambertMaterial({ color: 0x7bc96f })
        );
        suelo.rotation.x = -Math.PI / 2;
        scene.add(suelo);

        // Borde bajo: marca visualmente el límite del mundo (sin paredes invisibles confusas)
        const colorBorde = 0xd9a86b;
        const pasos = 18;
        for (let i = 0; i <= pasos; i++){
          const t = (i / pasos) * (LIMITE * 2) - LIMITE;
          [[t, LIMITE], [t, -LIMITE], [LIMITE, t], [-LIMITE, t]].forEach(([x, z]) => {
            const poste = new THREE.Mesh(
              new THREE.BoxGeometry(0.3, 0.6, 0.3),
              new THREE.MeshLambertMaterial({ color: colorBorde })
            );
            poste.position.set(x, 0.3, z);
            scene.add(poste);
          });
        }

        // Decoración fija: árboles y rocas (no bloquean el paso, son solo paisaje en Fase 37)
        const arboles = [[-8,-6],[8,-7],[-9,7],[9,8],[3,-9],[-4,9],[0,-11]];
        arboles.forEach(([x,z]) => scene.add(crearArbol(x, z)));
        const rocas = [[-3,3,1],[5,2,0.8],[-6,-2,1.2],[2,6,0.9]];
        rocas.forEach(([x,z,e]) => scene.add(crearRoca(x, z, e)));

        // Pasto y flores (Fase 41): solo textura visual del suelo, no interactúan
        for (let i = 0; i < 36; i++){
          const x = (Math.random() * 2 - 1) * (LIMITE - 1);
          const z = (Math.random() * 2 - 1) * (LIMITE - 1);
          scene.add(crearPasto(x, z));
        }
        const coloresFlor = [0xffffff, 0xf472b6, 0x60a5fa];
        for (let i = 0; i < 14; i++){
          const x = (Math.random() * 2 - 1) * (LIMITE - 2);
          const z = (Math.random() * 2 - 1) * (LIMITE - 2);
          scene.add(crearFlor(x, z, coloresFlor[i % coloresFlor.length]));
        }

        // Cielo (Fase 41): nubes y sol, decoración fija
        scene.add(crearNube(-9, 9, -10));
        scene.add(crearNube(7, 10.5, -8));
        scene.add(crearNube(-4, 8.5, -14));
        const sol = new THREE.Mesh(
          new THREE.SphereGeometry(1.3, 16, 16),
          new THREE.MeshBasicMaterial({ color: 0xfff1b8 })
        );
        sol.position.set(11, 13, -13);
        scene.add(sol);

        // Avatar de Samuel (Fase 41): personaje simple parecido a samuel-avatar.png
        avatar = crearAvatarSamuel();
        avatar.position.set(avatarPos.x, 0, avatarPos.z);
        scene.add(avatar);

        avatarShadow = new THREE.Mesh(
          new THREE.CircleGeometry(0.55, 16),
          new THREE.MeshBasicMaterial({ color: 0x1f2937, transparent: true, opacity: 0.18 })
        );
        avatarShadow.rotation.x = -Math.PI / 2;
        avatarShadow.position.set(avatarPos.x, 0.02, avatarPos.z);
        scene.add(avatarShadow);

        camActual.set(avatarPos.x, 5.2, avatarPos.z + 7.5);

        crearColeccionables();

        ajustarTamano();
        placeholder.style.display = 'none';
      }

      function ajustarTamano(){
        if (!renderer) return;
        const w = stage.clientWidth || 600;
        const h = stage.clientHeight || 420;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', ajustarTamano);

      // --- Movimiento simple: flechas / WASD, sin mouse-look (evita marear) ---
      window.addEventListener('keydown', (e) => { ensureAudioM(); iniciarAmbienteM(); teclas[e.key.toLowerCase()] = true; });
      window.addEventListener('keyup',   (e) => { teclas[e.key.toLowerCase()] = false; });

      // --- Controles táctiles grandes (Fase 38): mantener apretado para moverse, soltar para frenar ---
      function wireBotonMovimiento(id, tecla){
        const btn = document.getElementById(id);
        if (!btn) return;
        const activar = (ev) => { ev.preventDefault(); ensureAudioM(); iniciarAmbienteM(); teclas[tecla] = true; };
        const desactivar = (ev) => { if (ev) ev.preventDefault(); teclas[tecla] = false; };
        btn.addEventListener('pointerdown', activar);
        btn.addEventListener('pointerup', desactivar);
        btn.addEventListener('pointerleave', desactivar);
        btn.addEventListener('pointercancel', desactivar);
      }
      wireBotonMovimiento('mundoUp', 'arrowup');
      wireBotonMovimiento('mundoDown', 'arrowdown');
      wireBotonMovimiento('mundoLeft', 'arrowleft');
      wireBotonMovimiento('mundoRight', 'arrowright');

      function actualizarAvatar(dt){
        let dx = 0, dz = 0;
        if (teclas['arrowup'] || teclas['w']) dz -= 1;
        if (teclas['arrowdown'] || teclas['s']) dz += 1;
        if (teclas['arrowleft'] || teclas['a']) dx -= 1;
        if (teclas['arrowright'] || teclas['d']) dx += 1;
        if (dx || dz){
          const len = Math.hypot(dx, dz);
          dx /= len; dz /= len;
          avatarPos.x += dx * VELOCIDAD * dt;
          avatarPos.z += dz * VELOCIDAD * dt;
          avatarPos.x = Math.max(-LIMITE, Math.min(LIMITE, avatarPos.x));
          avatarPos.z = Math.max(-LIMITE, Math.min(LIMITE, avatarPos.z));
          avatar.position.x = avatarPos.x;
          avatar.position.z = avatarPos.z;
          avatarShadow.position.x = avatarPos.x;
          avatarShadow.position.z = avatarPos.z;
          // Pequeño rebote al caminar, sin física compleja
          avatar.position.y = Math.abs(Math.sin(performance.now() / 140)) * 0.12;
        } else {
          avatar.position.y = 0;
        }
      }

      function actualizarCamara(dt){
        const objetivo = new THREE.Vector3(avatarPos.x, 5.2, avatarPos.z + 7.5);
        camActual.lerp(objetivo, Math.min(1, dt * 3));
        camera.position.copy(camActual);
        camera.lookAt(avatarPos.x, 1, avatarPos.z);
      }

      let ultimoTiempo = performance.now();
      function loop(){
        const ahora = performance.now();
        const dt = Math.min(0.05, (ahora - ultimoTiempo) / 1000);
        ultimoTiempo = ahora;
        actualizarAvatar(dt);
        actualizarCamara(dt);
        revisarColeccionables();
        coleccionables.forEach((c) => {
          if (!c.encontrado && c.tipo === 'estrella'){ c.mesh.rotation.y += dt * 1.8; c.mesh.rotation.x += dt * 0.9; }
        });
        renderer.render(scene, camera);
        window.__mundoRAF = requestAnimationFrame(loop);
      }

      try{
        crearMundo();
        loop();
      }catch(e){
        placeholder.style.display = 'block';
        placeholder.innerHTML = '<div class="emoji">😴</div><div>El mundo 3D no se pudo mostrar en este dispositivo.</div>';
      }
    })();

    // --- Service worker (mismo que el resto de la app) ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw-aac.js');
    }
  </script>
</body>
