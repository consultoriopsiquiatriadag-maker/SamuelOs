<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Mundo de Samuel</title>
  <style>
    :root{
      --bg:#f2f5f8;
      --card:#ffffff;
      --stroke:#e5e7eb;
      --shadow: 0 16px 34px rgba(2,6,23,.14);
      --blue:#2563eb;
      --text:#0f172a;
      --muted:#475569;
      --ok:#16a34a;
      --warn:#f59e0b;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial; background:var(--bg); color:var(--text);}
    .shell{max-width:1120px;margin:0 auto;padding:18px 18px 26px;}

    header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .brand{display:flex;align-items:center;gap:14px;}
    .avatar{width:64px;height:64px;border-radius:999px;background:#fff;border:2px solid var(--stroke);box-shadow:0 10px 20px rgba(2,6,23,.08);overflow:hidden;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    h1{margin:0;font-size:26px;letter-spacing:-.02em;}
    .hint{margin-top:6px;color:var(--muted);font-weight:750;}

    #starsBadge{transition:transform .25s ease;}
    #starsBadge.pulse-stars{transform:scale(1.15);}

    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .btn{border:2px solid rgba(15,23,42,.12); background:#fff; padding:14px 18px; border-radius:16px; font-weight:900; cursor:pointer; text-decoration:none; color:var(--text); display:inline-flex; align-items:center; gap:10px; box-shadow:0 14px 28px rgba(2,6,23,.10); font-size:17px;}
    .btn.primary{background:var(--blue); color:#fff; border-color:transparent;}
    .btn.big{padding:18px 26px;border-radius:20px;font-size:20px;}
    .pill{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(15,23,42,.12);background:#fff;padding:10px 12px;border-radius:999px;font-weight:900;}

    /* Escenario del Mundo de Samuel (Fase 36: esqueleto, sin motor 3D todavía) */
    .mundo-stage{
      margin-top:18px;
      border-radius:24px;
      background:linear-gradient(180deg,#bfe3fb,#e0f2fe);
      border:2px solid rgba(15,23,42,.12);
      box-shadow:var(--shadow);
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    #mundoCanvas{ width:100%; height:100%; display:block; }
    .mundo-placeholder{ text-align:center; color:var(--muted); font-weight:800; padding:40px; }
    .mundo-placeholder .emoji{ font-size:64px; margin-bottom:10px; }

    .mundo-footer{ margin-top:16px; display:flex; justify-content:center; gap:14px; flex-wrap:wrap; }

    .mundo-objetivo{ position:absolute; top:14px; left:14px; z-index:3; background:rgba(255,255,255,.92); }

    /* Controles táctiles grandes (Fase 38): mismo estilo que el Laberinto, para no aprender un botón nuevo */
    .mundo-controles{
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
      z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px;
      user-select:none; -webkit-user-select:none; touch-action:none;
    }
    .mundo-controles .fila{ display:flex; gap:12px; }
    .mundo-btn{
      border:none; border-radius:18px; min-width:64px; min-height:64px; font-size:26px;
      cursor:pointer; background:rgba(255,255,255,.88); box-shadow:0 10px 22px rgba(2,6,23,.22);
    }
    .mundo-btn:active{ background:#fff; transform:scale(.94); }
    @media (max-width:600px){
      .mundo-stage{ min-height:320px; }
      h1{ font-size:22px; }
      .mundo-btn{ min-width:56px; min-height:56px; font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="avatar"><img src="./samuel-avatar.png" alt="" /></div>
        <div>
          <h1>🌍 Mundo de Samuel</h1>
          <div class="hint">Caminá despacio y buscá las estrellas.</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill" id="starsBadge">⭐ 0</div>
      </div>
    </header>

    <div class="mundo-stage" id="mundoStage">
      <div class="mundo-placeholder" id="mundoPlaceholder">
        <div class="emoji">🌳</div>
        <div>El mundo se está preparando...</div>
      </div>
      <!-- Fase 37: el canvas de Three.js se agrega aquí dentro por JS -->

      <div class="pill mundo-objetivo" id="mundoObjetivo">🎯 Buscá las estrellas</div>

      <!-- Fase 38: controles táctiles grandes, mismo estilo que el Laberinto -->
      <div class="mundo-controles" id="mundoControles" aria-label="Controles para moverse">
        <button class="mundo-btn" id="mundoUp" aria-label="Arriba">⬆️</button>
        <div class="fila">
          <button class="mundo-btn" id="mundoLeft" aria-label="Izquierda">⬅️</button>
          <button class="mundo-btn" id="mundoDown" aria-label="Abajo">⬇️</button>
          <button class="mundo-btn" id="mundoRight" aria-label="Derecha">➡️</button>
        </div>
      </div>
    </div>

    <div class="mundo-footer">
      <a class="btn primary big" href="./juegos.html">⬅️ Volver</a>
      <button class="btn big" id="btnAyuda">🔊 Escuchar ayuda</button>
    </div>
  </div>

  <!--
    Fase 37: motor 3D con Three.js (cargado desde CDN, r128).
    El "Mundo de Samuel" es una escena propia y simplificada, escrita desde cero para esta app:
    NO se copió código del repo de referencia evaluado en la Fase 35
    (ashish0kumar/Minecraft-Javascript-Edition, licencia MIT) — solo se usó como referencia
    de qué es razonable hacer con Three.js puro, sin backend y sin build step.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // --- Estrellas compartidas con el resto de Samuel OS (mismo localStorage que juegos.html / child.html) ---
    function todayKeyM(){
      const d = new Date();
      return 'samuel_progress_' + d.toISOString().slice(0,10);
    }
    function loadProgressM(){
      try{
        const raw = localStorage.getItem(todayKeyM());
        if (!raw) return { stars:0, jugar:false, hablar:false, aprender:false };
        return JSON.parse(raw);
      }catch(e){
        return { stars:0, jugar:false, hablar:false, aprender:false };
      }
    }
    function updateStarsBadgeM(){
      const el = document.getElementById('starsBadge');
      if (!el) return;
      el.textContent = '⭐ ' + (loadProgressM().stars || 0);
    }
    updateStarsBadgeM();

    // --- Voz (igual que en juegos.html) ---
    function speak(text){
      try{
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices?.() || [];
        const es = voices.find(v => /es/i.test(v.lang)) || voices.find(v => /spanish/i.test(v.name)) || voices[0];
        if (es) u.voice = es;
        u.rate = 0.95;
        u.pitch = 1.05;
        u.volume = 1;
        window.speechSynthesis.speak(u);
      }catch(e){/* ignore */}
    }

    document.getElementById('btnAyuda').addEventListener('click', () => {
      speak('Samuel, caminá despacio y buscá las estrellas.');
    });

    // Mensaje de bienvenida al entrar a la pantalla
    setTimeout(() => speak('Samuel, caminá despacio y buscá las estrellas.'), 600);

    // --- Mundo de Samuel: escena 3D básica (Fase 37) ---
    // Mundo chico, tranquilo, sin enemigos, sin violencia, modo exploración únicamente.
    (function(){
      const stage = document.getElementById('mundoStage');
      const placeholder = document.getElementById('mundoPlaceholder');
      if (!stage) return;

      if (typeof THREE === 'undefined') {
        placeholder.innerHTML = '<div class="emoji">😴</div><div>El mundo 3D no se pudo cargar. Probá con internet conectado.</div>';
        return;
      }

      let renderer, scene, camera;
      let avatar, avatarShadow;
      const LIMITE = 13; // mundo chico: el personaje no puede salir de este cuadrado
      const VELOCIDAD = 4.2; // unidades por segundo: "caminar despacio"
      const teclas = {};
      const avatarPos = { x: 0, z: 4 };
      const camActual = new THREE.Vector3();

      function crearArbol(x, z){
        const grupo = new THREE.Group();
        const tronco = new THREE.Mesh(
          new THREE.CylinderGeometry(0.25, 0.32, 1.4, 8),
          new THREE.MeshLambertMaterial({ color: 0x8a5a32 })
        );
        tronco.position.y = 0.7;
        const copa = new THREE.Mesh(
          new THREE.ConeGeometry(1.05, 1.7, 9),
          new THREE.MeshLambertMaterial({ color: 0x3fa34d })
        );
        copa.position.y = 2.05;
        grupo.add(tronco, copa);
        grupo.position.set(x, 0, z);
        return grupo;
      }

      function crearRoca(x, z, escala){
        const roca = new THREE.Mesh(
          new THREE.DodecahedronGeometry(0.5 * escala, 0),
          new THREE.MeshLambertMaterial({ color: 0x9aa3ad })
        );
        roca.position.set(x, 0.35 * escala, z);
        roca.rotation.set(Math.random(), Math.random(), Math.random());
        return roca;
      }

      function crearMundo(){
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbfe3fb);
        scene.fog = new THREE.Fog(0xbfe3fb, 18, 34);

        camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        stage.appendChild(renderer.domElement);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.inset = '0';

        // Luz suave, sin sombras duras (clima tranquilo)
        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const sol = new THREE.DirectionalLight(0xfff4d6, 0.7);
        sol.position.set(8, 14, 6);
        scene.add(sol);

        // Suelo (mundo pequeño)
        const suelo = new THREE.Mesh(
          new THREE.PlaneGeometry(LIMITE * 2 + 4, LIMITE * 2 + 4),
          new THREE.MeshLambertMaterial({ color: 0x7bc96f })
        );
        suelo.rotation.x = -Math.PI / 2;
        scene.add(suelo);

        // Borde bajo: marca visualmente el límite del mundo (sin paredes invisibles confusas)
        const colorBorde = 0xd9a86b;
        const pasos = 18;
        for (let i = 0; i <= pasos; i++){
          const t = (i / pasos) * (LIMITE * 2) - LIMITE;
          [[t, LIMITE], [t, -LIMITE], [LIMITE, t], [-LIMITE, t]].forEach(([x, z]) => {
            const poste = new THREE.Mesh(
              new THREE.BoxGeometry(0.3, 0.6, 0.3),
              new THREE.MeshLambertMaterial({ color: colorBorde })
            );
            poste.position.set(x, 0.3, z);
            scene.add(poste);
          });
        }

        // Decoración fija: árboles y rocas (no bloquean el paso, son solo paisaje en Fase 37)
        const arboles = [[-8,-6],[8,-7],[-9,7],[9,8],[3,-9],[-4,9],[0,-11]];
        arboles.forEach(([x,z]) => scene.add(crearArbol(x, z)));
        const rocas = [[-3,3,1],[5,2,0.8],[-6,-2,1.2],[2,6,0.9]];
        rocas.forEach(([x,z,e]) => scene.add(crearRoca(x, z, e)));

        // Avatar de Samuel: una esfera amigable (sin caras realistas, estilo simple)
        avatar = new THREE.Mesh(
          new THREE.SphereGeometry(0.55, 20, 16),
          new THREE.MeshLambertMaterial({ color: 0xf59e0b })
        );
        avatar.position.set(avatarPos.x, 0.55, avatarPos.z);
        scene.add(avatar);

        avatarShadow = new THREE.Mesh(
          new THREE.CircleGeometry(0.55, 16),
          new THREE.MeshBasicMaterial({ color: 0x1f2937, transparent: true, opacity: 0.18 })
        );
        avatarShadow.rotation.x = -Math.PI / 2;
        avatarShadow.position.set(avatarPos.x, 0.02, avatarPos.z);
        scene.add(avatarShadow);

        camActual.set(avatarPos.x, 5.2, avatarPos.z + 7.5);

        ajustarTamano();
        placeholder.style.display = 'none';
      }

      function ajustarTamano(){
        if (!renderer) return;
        const w = stage.clientWidth || 600;
        const h = stage.clientHeight || 420;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', ajustarTamano);

      // --- Movimiento simple: flechas / WASD, sin mouse-look (evita marear) ---
      window.addEventListener('keydown', (e) => { teclas[e.key.toLowerCase()] = true; });
      window.addEventListener('keyup',   (e) => { teclas[e.key.toLowerCase()] = false; });

      // --- Controles táctiles grandes (Fase 38): mantener apretado para moverse, soltar para frenar ---
      function wireBotonMovimiento(id, tecla){
        const btn = document.getElementById(id);
        if (!btn) return;
        const activar = (ev) => { ev.preventDefault(); teclas[tecla] = true; };
        const desactivar = (ev) => { if (ev) ev.preventDefault(); teclas[tecla] = false; };
        btn.addEventListener('pointerdown', activar);
        btn.addEventListener('pointerup', desactivar);
        btn.addEventListener('pointerleave', desactivar);
        btn.addEventListener('pointercancel', desactivar);
      }
      wireBotonMovimiento('mundoUp', 'arrowup');
      wireBotonMovimiento('mundoDown', 'arrowdown');
      wireBotonMovimiento('mundoLeft', 'arrowleft');
      wireBotonMovimiento('mundoRight', 'arrowright');

      function actualizarAvatar(dt){
        let dx = 0, dz = 0;
        if (teclas['arrowup'] || teclas['w']) dz -= 1;
        if (teclas['arrowdown'] || teclas['s']) dz += 1;
        if (teclas['arrowleft'] || teclas['a']) dx -= 1;
        if (teclas['arrowright'] || teclas['d']) dx += 1;
        if (dx || dz){
          const len = Math.hypot(dx, dz);
          dx /= len; dz /= len;
          avatarPos.x += dx * VELOCIDAD * dt;
          avatarPos.z += dz * VELOCIDAD * dt;
          avatarPos.x = Math.max(-LIMITE, Math.min(LIMITE, avatarPos.x));
          avatarPos.z = Math.max(-LIMITE, Math.min(LIMITE, avatarPos.z));
          avatar.position.x = avatarPos.x;
          avatar.position.z = avatarPos.z;
          avatarShadow.position.x = avatarPos.x;
          avatarShadow.position.z = avatarPos.z;
          // Pequeño rebote al caminar, sin física compleja
          avatar.position.y = 0.55 + Math.abs(Math.sin(performance.now() / 140)) * 0.12;
        } else {
          avatar.position.y = 0.55;
        }
      }

      function actualizarCamara(dt){
        const objetivo = new THREE.Vector3(avatarPos.x, 5.2, avatarPos.z + 7.5);
        camActual.lerp(objetivo, Math.min(1, dt * 3));
        camera.position.copy(camActual);
        camera.lookAt(avatarPos.x, 1, avatarPos.z);
      }

      let ultimoTiempo = performance.now();
      function loop(){
        const ahora = performance.now();
        const dt = Math.min(0.05, (ahora - ultimoTiempo) / 1000);
        ultimoTiempo = ahora;
        actualizarAvatar(dt);
        actualizarCamara(dt);
        renderer.render(scene, camera);
        window.__mundoRAF = requestAnimationFrame(loop);
      }

      try{
        crearMundo();
        loop();
      }catch(e){
        placeholder.style.display = 'block';
        placeholder.innerHTML = '<div class="emoji">😴</div><div>El mundo 3D no se pudo mostrar en este dispositivo.</div>';
      }
    })();

    // --- Service worker (mismo que el resto de la app) ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw-aac.js');
    }
  </script>
</body>
</html>
