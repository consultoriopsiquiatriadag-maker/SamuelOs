<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escuela de Samuel</title>
    <style>
        :root {
            --color-numeros: #f59e0b;
            --color-letras: #3b82f6;
            --color-colores: #8b5cf6;
            --color-palabras: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --shadow: 0 8px 30px rgba(0,0,0,0.10);
            --radius: 32px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            flex-shrink: 0;
        }

        .btn-volver {
            display: inline-flex; align-items: center; gap: 10px;
            background: #f97316; color: #fff; border: none;
            padding: 14px 24px; border-radius: 22px;
            font-size: 18px; font-weight: 900; min-height: 56px;
            box-shadow: 0 6px 18px rgba(249,115,22,.35);
            cursor: pointer; text-decoration: none;
            transition: transform .12s, box-shadow .12s;
        }
        .btn-volver:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(249,115,22,.45); }
        .btn-volver:active { transform: scale(.95); }

        .header-center {
            font-size: 1.4rem;
            font-weight: 900;
            color: #10b981;
            text-align: center;
        }

        .header-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #10b981;
        }

        /* --- HUB --- */
        #view-hub {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 24px;
            padding: 28px 40px 36px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .cat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: var(--shadow);
            transition: transform .15s, box-shadow .15s;
            border-bottom: 12px solid #ddd;
        }
        .cat-card:hover { transform: translateY(-5px) scale(1.02); }
        .cat-card:active { transform: scale(.95); }

        .cat-card.numeros { border-bottom-color: var(--color-numeros); color: var(--color-numeros); }
        .cat-card.letras  { border-bottom-color: var(--color-letras);  color: var(--color-letras); }
        .cat-card.colores { border-bottom-color: var(--color-colores); color: var(--color-colores); }
        .cat-card.palabras{ border-bottom-color: var(--color-palabras);color: var(--color-palabras); }

        .cat-icon  { font-size: 72px; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.10)); }
        .cat-label { font-size: 1.7rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .cat-sub   { font-size: 0.9rem; font-weight: 600; opacity: 0.7; text-transform: none; }

        /* --- FLASHCARD VIEW --- */
        #view-cards {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px 28px 28px;
            gap: 18px;
        }

        .fc-topbar {
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .btn-volver-cat {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f97316; color: #fff; border: none;
            padding: 12px 20px; border-radius: 18px;
            font-size: 16px; font-weight: 900;
            cursor: pointer; transition: transform .12s;
        }
        .btn-volver-cat:active { transform: scale(.95); }

        .fc-cat-title {
            font-size: 1.2rem;
            font-weight: 900;
            flex: 1;
            text-align: center;
        }

        .fc-progress {
            font-size: 1rem;
            font-weight: 700;
            color: #64748b;
            white-space: nowrap;
        }

        /* La ficha grande */
        .flashcard {
            flex: 1;
            width: 100%;
            max-width: 560px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 24px;
            gap: 10px;
            transition: transform .2s;
            position: relative;
            overflow: hidden;
        }

        .fc-stripe {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 10px;
            border-radius: 40px 40px 0 0;
        }

        .fc-visual {
            font-size: 100px;
            line-height: 1.1;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.12));
        }

        .fc-text {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            text-align: center;
        }

        .fc-sub {
            font-size: 1.6rem;
            font-weight: 700;
            color: #475569;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Controles */
        .fc-controls {
            width: 100%;
            max-width: 560px;
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .fc-btn {
            flex: 1;
            padding: 16px 10px;
            border: none;
            border-radius: 22px;
            font-size: 1.15rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform .12s, box-shadow .12s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.10);
        }
        .fc-btn:active { transform: scale(.93); }

        .fc-btn-prev { background: #e2e8f0; color: #475569; }
        .fc-btn-prev:hover { background: #cbd5e1; }

        .fc-btn-listen {
            background: #10b981; color: #fff; flex: 2;
            box-shadow: 0 6px 20px rgba(16,185,129,0.35);
        }
        .fc-btn-listen:hover { background: #059669; box-shadow: 0 10px 28px rgba(16,185,129,0.45); }

        .fc-btn-next { background: #e2e8f0; color: #475569; }
        .fc-btn-next:hover { background: #cbd5e1; }

        /* Celebración */
        #celebration {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.97);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            text-align: center;
            animation: zoomIn .3s ease-out;
        }
        .celeb-emoji { font-size: 5rem; }
        .celeb-text { font-size: 2rem; color: #10b981; }
        .celeb-sub  { font-size: 1.1rem; color: #64748b; font-weight: 600; }
        .celeb-btn  {
            background: #10b981; color: #fff; border: none;
            padding: 18px 40px; border-radius: 28px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 24px rgba(16,185,129,0.4);
            margin-top: 10px;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(.88); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes cardFlip {
            0%   { transform: scale(1); }
            50%  { transform: scale(.92); }
            100% { transform: scale(1); }
        }
        .card-animate { animation: cardFlip .18s ease-out; }

        @media (max-width: 600px) {
            #view-hub { padding: 16px 20px 24px; gap: 16px; }
            .cat-icon { font-size: 52px; }
            .cat-label { font-size: 1.3rem; }
            .fc-text { font-size: 3.5rem; }
            .fc-visual { font-size: 70px; }
        }
    </style>
</head>
<body>

<header>
    <a class="btn-volver" href="./child.html">◀ Volver</a>
    <div class="header-center">📚 Escuela de Samuel</div>
    <img class="header-avatar" src="./Perfil-Samuel.png" alt="Samuel">
</header>

<!-- HUB: elegir categoría -->
<div id="view-hub">
    <button class="cat-card numeros" onclick="openCategory('numeros')">
        <span class="cat-icon">🔢</span>
        <span class="cat-label">Números</span>
        <span class="cat-sub">Del 1 al 10</span>
    </button>
    <button class="cat-card letras" onclick="openCategory('letras')">
        <span class="cat-icon">🔤</span>
        <span class="cat-label">Letras</span>
        <span class="cat-sub">El abecedario</span>
    </button>
    <button class="cat-card colores" onclick="openCategory('colores')">
        <span class="cat-icon">🎨</span>
        <span class="cat-label">Colores</span>
        <span class="cat-sub">y Formas</span>
    </button>
    <button class="cat-card palabras" onclick="openCategory('palabras')">
        <span class="cat-icon">🖼️</span>
        <span class="cat-label">Palabras</span>
        <span class="cat-sub">Con imagen</span>
    </button>
</div>

<!-- VISTA FICHAS -->
<div id="view-cards">
    <div class="fc-topbar">
        <button class="btn-volver-cat" onclick="backToHub()">◀ Volver</button>
        <div class="fc-cat-title" id="fcCatTitle"></div>
        <div class="fc-progress" id="fcProgress"></div>
    </div>

    <div class="flashcard" id="flashcard">
        <div class="fc-stripe" id="fcStripe"></div>
        <div class="fc-visual" id="fcVisual"></div>
        <div class="fc-text"   id="fcText"></div>
        <div class="fc-sub"    id="fcSub"></div>
    </div>

    <div class="fc-controls">
        <button class="fc-btn fc-btn-prev" id="btnPrev" onclick="prevCard()">◀ Anterior</button>
        <button class="fc-btn fc-btn-listen" onclick="speakCard()">🔊 Escuchar</button>
        <button class="fc-btn fc-btn-next"  id="btnNext" onclick="nextCard()">Siguiente ▶</button>
    </div>
</div>

<!-- Celebración al completar -->
<div id="celebration">
    <div class="celeb-emoji">🌟</div>
    <div class="celeb-text">¡Muy bien, Samuel!</div>
    <div class="celeb-sub" id="celebSub">Terminaste todas las fichas</div>
    <button class="celeb-btn" onclick="restartCategory()">🔁 Repasar de nuevo</button>
    <button class="celeb-btn" style="background:#f97316;box-shadow:0 8px 24px rgba(249,115,22,.4);" onclick="backToHub()">📚 Elegir otra</button>
</div>

// ============================================================
//  DATOS DE CADA CATEGORÍA
// ============================================================
const CATEGORIAS = {

            { visual: '🐱',  texto: 'G', sub: 'de gato',     speak: 'G, ge de gato' },
            { visual: '🍦',  texto: 'H', sub: 'de helado',   speak: 'H, ache de helado' },
            { visual: '🏝️',  texto: 'I', sub: 'de isla',     speak: 'I, i de isla' },
            { visual: '🦒',  texto: 'J', sub: 'de jirafa',   speak: 'J, jota de jirafa' },
            { visual: '🐨',  texto: 'K', sub: 'de koala',    speak: 'K, ka de koala' },
            { visual: '🌙',  texto: 'L', sub: 'de luna',     speak: 'L, ele de luna' },
            { visual: '👩',  texto: 'M', sub: 'de mamá',     speak: 'M, eme de mamá' },
            { visual: '☁️',  texto: 'N', sub: 'de nube',     speak: 'N, ene de nube' },
            { visual: '🦃',  texto: 'Ñ', sub: 'de ñandú',   speak: 'Ñe, ñe de ñandú' },
            { visual: '🐻',  texto: 'O', sub: 'de oso',      speak: 'O, o de oso' },
            { visual: '🐕',  texto: 'P', sub: 'de perro',    speak: 'P, pe de perro' },
            { visual: '🧀',  texto: 'Q', sub: 'de queso',    speak: 'Q, cu de queso' },

            { visual: '☀️',  texto: 'S', sub: 'de sol',      speak: 'S, ese de sol' },
            { visual: '🚂',  texto: 'T', sub: 'de tren',     speak: 'T, te de tren' },
            { visual: '🍇',  texto: 'U', sub: 'de uva',      speak: 'U, u de uva' },
            { visual: '🐄',  texto: 'V', sub: 'de vaca',     speak: 'V, ve de vaca' },
            { visual: '🧇',  texto: 'W', sub: 'de waffle',   speak: 'W, doble ve de waffle' },
            { visual: '🎶',  texto: 'X', sub: 'de xilófono', speak: 'X, equis de xilófono' },
            { visual: '⛵',  texto: 'Y', sub: 'de yate',     speak: 'Y, ye de yate' },
            { visual: '👟',  texto: 'Z', sub: 'de zapato',   speak: 'Z, zeta de zapato' },
        ]
    },

    colores: {
        titulo: '🎨 Colores y Formas',
        color: '#8b5cf6',
        fichas: [
            { visual: '🔴', texto: 'Rojo',      sub: 'color',   speak: 'rojo, el color rojo' },
            { visual: '🔵', texto: 'Azul',       sub: 'color',   speak: 'azul, el color azul' },
            { visual: '🟢', texto: 'Verde',      sub: 'color',   speak: 'verde, el color verde' },
            { visual: '🟡', texto: 'Amarillo',   sub: 'color',   speak: 'amarillo, el color amarillo' },
            { visual: '🟠', texto: 'Naranja',    sub: 'color',   speak: 'naranja, el color naranja' },
            { visual: '🟣', texto: 'Violeta',    sub: 'color',   speak: 'violeta, el color violeta' },
            { visual: '⚫', texto: 'Negro',      sub: 'color',   speak: 'negro, el color negro' },
            { visual: '⚪', texto: 'Blanco',     sub: 'color',   speak: 'blanco, el color blanco' },
            { visual: '🩷', texto: 'Rosa',       sub: 'color',   speak: 'rosa, el color rosa' },
            { visual: '🩵', texto: 'Celeste',    sub: 'color',   speak: 'celeste, el color celeste' },
            { visual: '⭕', texto: 'Círculo',    sub: 'forma',   speak: 'círculo, la forma círculo' },
            { visual: '🟦', texto: 'Cuadrado',   sub: 'forma',   speak: 'cuadrado, la forma cuadrado' },
            { visual: '🔺', texto: 'Triángulo',  sub: 'forma',   speak: 'triángulo, la forma triángulo' },

    palabras: {

            { visual: '🐕', texto: 'PERRO',    sub: 'perro',    speak: 'perro' },

            { visual: '🛏️', texto: 'CAMA',     sub: 'cama',     speak: 'cama' },
            { visual: '👩', texto: 'MAMÁ',     sub: 'mamá',     speak: 'mamá' },
            { visual: '👨', texto: 'PAPÁ',     sub: 'papá',     speak: 'papá' },
            { visual: '🎈', texto: 'GLOBO',    sub: 'globo',    speak: 'globo' },
            { visual: '🌙', texto: 'LUNA',     sub: 'luna',     speak: 'luna' },
            { visual: '👟', texto: 'ZAPATO',   sub: 'zapato',   speak: 'zapato' },
        ]
    }
};

// ============================================================
//  ESTADO
// ============================================================
let currentCatKey = null;
let currentIndex  = 0;
let speakTimer    = null;

// ============================================================
//  NAVEGACIÓN
// ============================================================
function openCategory(catKey) {
    currentCatKey = catKey;
    currentIndex  = 0;
    document.getElementById('view-hub').style.display   = 'none';
    document.getElementById('view-cards').style.display = 'flex';
    const cat = CATEGORIAS[catKey];
    document.getElementById('fcCatTitle').textContent   = cat.titulo;
    document.getElementById('fcCatTitle').style.color   = cat.color;
    document.getElementById('fcStripe').style.background = cat.color;
    renderCard(true);
}

function backToHub() {
    cancelSpeak();
    document.getElementById('celebration').style.display = 'none';
    document.getElementById('view-cards').style.display  = 'none';
    document.getElementById('view-hub').style.display    = 'grid';
    currentCatKey = null;
}

function restartCategory() {
    document.getElementById('celebration').style.display = 'none';
    currentIndex = 0;
    renderCard(true);
}

// ============================================================
//  RENDERIZAR FICHA
// ============================================================
function renderCard(autoSpeak) {
    if (!currentCatKey) return;
    const fichas = CATEGORIAS[currentCatKey].fichas;
    const f = fichas[currentIndex];

    // Animación de transición
    const card = document.getElementById('flashcard');
    card.classList.remove('card-animate');
    void card.offsetWidth; // reflow
    card.classList.add('card-animate');

    document.getElementById('fcVisual').textContent  = f.visual;
    document.getElementById('fcText').textContent    = f.texto;
    document.getElementById('fcSub').textContent     = f.sub;
    document.getElementById('fcProgress').textContent = `${currentIndex + 1} / ${fichas.length}`;

    // prev/next disable
    document.getElementById('btnPrev').disabled = currentIndex === 0;
    document.getElementById('btnNext').disabled = currentIndex === fichas.length - 1;

    if (autoSpeak) {
        cancelSpeak();
        speakTimer = setTimeout(speakCard, 400);
    }
}

// ============================================================
//  NAVEGACIÓN FICHAS
// ============================================================
function nextCard() {
    const fichas = CATEGORIAS[currentCatKey].fichas;
    if (currentIndex < fichas.length - 1) {
        currentIndex++;
        renderCard(true);
    } else {
        showCelebration();
    }
}

function prevCard() {
    if (currentIndex > 0) {
        currentIndex--;
        renderCard(true);
    }
}

// ============================================================
//  AUDIO (speechSynthesis)
// ============================================================
function speakCard() {
    if (!currentCatKey) return;
    const f = CATEGORIAS[currentCatKey].fichas[currentIndex];
    sayText(f.speak);
}

function sayText(text) {
    cancelSpeak();
    const u = new SpeechSynthesisUtterance(text);
    u.lang  = 'es-AR';
    u.rate  = 0.85;
    u.pitch = 1.1;
    // Preferir voz en español si está disponible
    const voices = speechSynthesis.getVoices();
    const esp = voices.find(v => v.lang.startsWith('es'));
    if (esp) u.voice = esp;
    speechSynthesis.speak(u);
}

function cancelSpeak() {
    if (speakTimer) { clearTimeout(speakTimer); speakTimer = null; }
    speechSynthesis.cancel();
}

// ============================================================
//  CELEBRACIÓN
// ============================================================
function showCelebration() {
    cancelSpeak();
    const cat = CATEGORIAS[currentCatKey];
    const n   = cat.fichas.length;
    document.getElementById('celebSub').textContent = `Repasaste ${n} fichas de ${cat.titulo}`;
    document.getElementById('celebration').style.display = 'flex';
    setTimeout(() => sayText('¡Muy bien, Samuel! ¡Lo hiciste genial!'), 300);
}

// Cargar voces al arrancar (Chrome necesita esto)
speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
window.onload = () => { speechSynthesis.getVoices(); };
</script>
