<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAMUEL OS - Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F7FF;
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --color-jugar: #7C83FD;
            --color-videos: #FF7A7A;
            --color-hablar: #5CC8FF;
            --color-ayuda: #7ED957;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-card: 0 20px 40px rgba(0,0,0,0.1);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at top right, #ffffff, #F5F7FF);
        }

        /* --- Header --- */
        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeInDown 0.8s ease-out;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--color-hablar), var(--color-jugar));
            border: 4px solid white;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        h1 {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--text-color);
        }

        /* --- Grid Principal --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 25px;
            padding: 10px 40px 30px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.03) translateY(-5px);
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-jugar { animation: cardIn 0.6s ease-out backwards; animation-delay: 0s; }
        .card-videos { animation: cardIn 0.6s ease-out backwards; animation-delay: 0.08s; }
        .card-hablar { animation: cardIn 0.6s ease-out backwards; animation-delay: 0.16s; }
        .card-ayuda { animation: cardIn 0.6s ease-out backwards; animation-delay: 0.24s; }

        .card-icon {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        .card-label {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Colores Específicos */
        .card-jugar { border-bottom: 12px solid var(--color-jugar); color: var(--color-jugar); }
        .card-videos { border-bottom: 12px solid var(--color-videos); color: var(--color-videos); }
        .card-hablar { border-bottom: 12px solid var(--color-hablar); color: var(--color-hablar); }
        .card-ayuda { border-bottom: 12px solid var(--color-ayuda); color: var(--color-ayuda); }

        /* --- Footer --- */
        footer {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .last-phrase {
            background: white;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- Misión del día / Estrellas --- */
        .mission-bar {
            margin: 0 40px 10px 40px;
            padding: 12px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            animation: fadeInDown 0.8s ease-out;
        }

        .mission-title {
            font-weight: 900;
            font-size: 0.95rem;
            color: var(--text-color);
            white-space: nowrap;
        }

        .mission-items {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mission-item {
            font-size: 1rem;
            font-weight: 800;
            color: #999;
            background: #F2F3F8;
            padding: 10px 20px;
            border-radius: 20px;
            transition: var(--transition);
            border: 2px solid #E5E7EB;
        }

        .mission-item.done {
            color: white;
            background: var(--color-ayuda);
            border-color: transparent;
            transform: scale(1.04);
        }

        .stars-badge {
            font-size: 1.1rem;
            font-weight: 900;
            background: #FFF7E0;
            padding: 8px 16px;
            border-radius: 30px;
            transition: transform 0.25s ease;
            white-space: nowrap;
        }

        .stars-badge.pulse-stars {
            transform: scale(1.15);
        }

        .level-badge {
            font-size: 0.85rem;
            font-weight: 800;
            background: #EAF6FF;
            color: #0b4aa7;
            padding: 6px 14px;
            border-radius: 30px;
            transition: transform 0.25s ease;
            white-space: nowrap;
        }

        .level-badge.pulse-stars {
            transform: scale(1.15);
        }

        @media (max-width: 768px) {
            .mission-bar { margin: 0 20px 10px 20px; padding: 10px 14px; }
            .mission-title { font-size: 0.8rem; }
            .mission-item { font-size: 0.85rem; padding: 8px 14px; }
        }

        .btn-parents {
            background: #EEE;
            color: #999;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-parents:hover { background: #E2E2E2; color: #666; }
        .btn-parents:active, .phrase-btn:active, .gate-actions button:active { transform: scale(0.95); }
        .phrase-btn, .gate-actions button { transition: var(--transition); }

        /* --- Zona de Papás: acceso discreto (Fase 7) --- */
        /* Sin texto ni color llamativo: un ícono chico y apagado para que no
           atraiga la atención de Samuel, pero sigue siendo tappeable por un adulto. */
        .zona-papas-discreet {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.3rem;
            padding: 10px 12px;
            cursor: pointer;
            opacity: 0.45;
            transition: var(--transition);
        }

        .zona-papas-discreet:hover,
        .zona-papas-discreet:focus {
            opacity: 1;
            color: #999;
        }

        .zona-papas-discreet:active { transform: scale(0.95); }

        /* --- Estrella flotante (feedback al ganar puntos) --- */
        .floating-star {
            position: fixed;
            font-size: 1.3rem;
            font-weight: 900;
            color: #FFB400;
            pointer-events: none;
            z-index: 500;
            animation: floatStar 1.1s ease-out forwards;
        }

        @keyframes floatStar {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.6); }
            15% { opacity: 1; transform: translate(-50%, -6px) scale(1.15); }
            100% { opacity: 0; transform: translate(-50%, -70px) scale(1); }
        }

        /* --- Modal Hablar --- */
        #speakModal {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: min-content;
            align-content: start;
            gap: 16px;
            padding: 90px 30px 30px;
            z-index: 100;
            overflow-y: auto;
            animation: zoomIn 0.3s ease-out;
        }

        .phrase-btn {
            background: white;
            border: 4px solid var(--color-hablar);
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 10px;
            min-height: 90px;
            box-shadow: var(--shadow-soft);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
        }

        /* --- Modal Gate (Zona de Papás) --- */
        #gateModal {
            position: fixed;
            inset: 0;
            background: rgba(20,20,30,0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: zoomIn 0.2s ease-out;
        }

        .gate-box {
            background: white;
            border-radius: 30px;
            padding: 35px 30px;
            width: min(380px, 90vw);
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .gate-box p {
            font-weight: 700;
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .gate-question {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 18px;
        }

        .gate-input {
            width: 100%;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            padding: 12px;
            border-radius: 16px;
            border: 3px solid #DDE3F5;
            margin-bottom: 14px;
        }

        .gate-input:focus { outline: none; border-color: var(--color-hablar); }

        .gate-msg {
            color: #ff4757;
            font-weight: 700;
            font-size: 0.85rem;
            min-height: 18px;
            margin-bottom: 10px;
        }

        .gate-actions {
            display: flex;
            gap: 10px;
        }

        .gate-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
        }

        .gate-cancel { background: #EEE; color: #777; }
        .gate-ok { background: var(--color-hablar); color: white; }

        /* --- Modal Fin de Videos (transición amable) --- */
        #videoLimitModal {
            position: fixed;
            inset: 0;
            background: rgba(20,20,30,0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 250;
            animation: zoomIn 0.25s ease-out;
        }

        .vl-box {
            background: white;
            border-radius: 30px;
            padding: 35px 30px;
            width: min(400px, 90vw);
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .vl-emoji {
            font-size: 60px;
            margin-bottom: 6px;
        }

        .vl-title {
            font-weight: 900;
            font-size: 1.3rem;
            margin-bottom: 6px;
        }

        .vl-sub {
            font-weight: 700;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .vl-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .vl-btn {
            flex: 1;
            padding: 18px 10px;
            border-radius: 20px;
            border: none;
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            color: white;
            transition: var(--transition);
        }

        .vl-btn:active { transform: scale(0.95); }
        .vl-jugar { background: var(--color-jugar); }
        .vl-hablar { background: var(--color-hablar); }

        .vl-dismiss {
            background: none;
            border: none;
            color: #aaa;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 6px;
        }

        /* --- Animaciones --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Responsivo para tablets/kioscos */
        @media (max-width: 768px) {
            .card-icon { font-size: 50px; }
            .card-label { font-size: 1.2rem; }
            main { padding: 10px 20px 20px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <div class="avatar">👦</div>
            <h1>Hola, Samuel</h1>
        </div>
        <button onclick="toggleFullscreen()" class="btn-parents">📺 Pantalla Completa</button>
    </header>

    <div class="mission-bar">
        <div class="mission-title">🎯 Misiones de hoy</div>
        <div class="mission-items">
            <span class="mission-item" id="mission-jugar">⬜ Jugar</span>
            <span class="mission-item" id="mission-hablar">⬜ Hablar</span>
            <span class="mission-item" id="mission-aprender">⬜ Aprender</span>
        </div>
        <div class="level-badge" id="levelBadge">🌱 Explorador</div>
        <div class="stars-badge" id="starsBadge">⭐ 0</div>
    </div>

    <main>
        <button class="card card-jugar" onclick="navigate('juegos.html')">
            <span class="card-icon">🎮</span>
            <span class="card-label">Jugar</span>
        </button>

        <button class="card card-videos" onclick="startVideoTimer()">
            <span class="card-icon">▶️</span>
            <span class="card-label">Videos</span>
        </button>

        <button class="card card-hablar" onclick="openHablar()">
            <span class="card-icon">🗣️</span>
            <span class="card-label">Hablar</span>
        </button>

        <button class="card card-ayuda" onclick="handleAyuda()">
            <span class="card-icon">❤️</span>
            <span class="card-label">Ayuda</span>
        </button>
    </main>

    <footer>
        <div class="last-phrase" id="status-bar">
            <span>⭐</span> <span id="lastText">¡Listo para empezar!</span>
        </div>
        <button onclick="openGate()" class="zona-papas-discreet" aria-label="Zona de Papás">⚙️</button>
    </footer>

    <div style="position:fixed; left:0; right:0; bottom:2px; text-align:center; font-size:9px; color:rgba(51,51,51,0.35); pointer-events:none; z-index:1;">
        Creado por PETER-SOFT Co. para juegosconsultoriodagnino.netlify.app (SITIO WEB OFICIAL)
    </div>

    <div id="speakModal">
        <button class="close-modal" onclick="closeHablar()">X CERRAR</button>
        <button class="phrase-btn" onclick="say('Quiero agua', '💧')">💧 Quiero agua</button>
        <button class="phrase-btn" onclick="say('Tengo hambre', '🍽️')">🍽️ Tengo hambre</button>
        <button class="phrase-btn" onclick="say('Tengo sueño', '😴')">😴 Tengo sueño</button>
        <button class="phrase-btn" onclick="say('Quiero jugar', '🧸')">🧸 Quiero jugar</button>
        <button class="phrase-btn" onclick="say('Necesito ayuda', '🆘')">🆘 Necesito ayuda</button>
        <button class="phrase-btn" onclick="say('Quiero descansar', '🛌')">🛌 Quiero descansar</button>
        <button class="phrase-btn" onclick="say('Estoy contento', '😊')">😊 Estoy contento</button>
        <button class="phrase-btn" onclick="say('Estoy enojado', '😠')">😠 Estoy enojado</button>
        <button class="phrase-btn" onclick="say('Me duele', '🤕')">🤕 Me duele</button>
        <button class="phrase-btn" onclick="say('Quiero ir al baño', '🚽')">🚽 Quiero ir al baño</button>
        <button class="phrase-btn" onclick="say('Te quiero mucho', '💖')">💖 Te quiero</button>
    </div>

    <div id="gateModal">
        <div class="gate-box">
            <p>Pregunta para grandes 🤓</p>
            <div class="gate-question" id="gateQuestion">¿Cuánto es 3×4?</div>
            <input type="number" inputmode="numeric" class="gate-input" id="gateInput" placeholder="Tu respuesta">
            <div class="gate-msg" id="gateMsg"></div>
            <div class="gate-actions">
                <button class="gate-cancel" onclick="closeGate()">Cancelar</button>
                <button class="gate-ok" onclick="checkGate()">Entrar</button>
            </div>
        </div>
    </div>

    <div id="videoLimitModal">
        <div class="vl-box">
            <div class="vl-emoji">🎬</div>
            <div class="vl-title">¡Se terminó el tiempito de videos!</div>
            <div class="vl-sub">¿Qué te gustaría hacer ahora?</div>
            <div class="vl-actions">
                <button class="vl-btn vl-jugar" onclick="closeVideoLimitModal(); navigate('juegos.html')">🎮 Jugar</button>
                <button class="vl-btn vl-hablar" onclick="closeVideoLimitModal(); openHablar()">🗣️ Hablar</button>
            </div>
            <button class="vl-dismiss" onclick="closeVideoLimitModal()">Está bien 👍</button>
        </div>
    </div>

    <script>
        // Configuración de Audios Parentales
        const parentalAudios = {
            bienvenido: 'audio/bienvenido.mp3',
            tiempoVideos: 'audio/tiempo-videos.mp3',
            cambiarActividad: 'audio/cambiar-actividad.mp3',
            vamosAJugar: 'audio/vamos-a-jugar.mp3',
            descanso: 'audio/descanso.mp3',
            ayuda: 'audio/ayuda.mp3'
        };

        // Textos de respaldo (si el archivo de audio no existe, se usa voz sintetizada)
        const parentalFallbackTexts = {
            bienvenido: "¡Hola Samuel! Qué bueno verte.",
            tiempoVideos: "Samuel, ya pasaste mucho tiempo mirando videos. Ahora vamos a cambiar de actividad.",
            cambiarActividad: "¡Muy bien Samuel! Cambiaste de actividad.",
            vamosAJugar: "¡Vamos a jugar!",
            descanso: "Es un buen momento para descansar un poquito.",
            ayuda: "Mamá y Papá ya vienen a ayudarte."
        };

        // --- Sistema de Sonido (WebAudio API Simulado con Audio) ---
        function playTapSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, context.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        // --- Gamificación (Misión del día + Estrellas) ---
        function todayKey() {
            const d = new Date();
            return 'samuel_progress_' + d.toISOString().slice(0, 10);
        }

        function loadProgress() {
            try {
                const raw = localStorage.getItem(todayKey());
                if (raw) {
                    const p = JSON.parse(raw);
                    // Migración Fase 23: la misión "Descansar" pasó a llamarse "Aprender".
                    if (p.aprender === undefined) p.aprender = !!p.descansar;
                    return p;
                }
            } catch (e) {}
            return { stars: 0, jugar: false, hablar: false, aprender: false };
        }

        function saveProgress(p) {
            localStorage.setItem(todayKey(), JSON.stringify(p));
        }

        // --- Nivel de Samuel e insignias (Fase 22) ---
        // "samuel_total_stars" es un contador de por vida (nunca baja, no hay castigos).
        const LEVELS = [
            { name: 'Explorador', emoji: '🌱', min: 0 },
            { name: 'Ayudante', emoji: '🤝', min: 15 },
            { name: 'Capitán', emoji: '🚀', min: 40 },
            { name: 'Piloto', emoji: '✈️', min: 80 },
            { name: 'Comandante Samuel', emoji: '🏆', min: 150 }
        ];
        const BADGES = [
            { stars: 10, name: '10 estrellas', emoji: '🥉' },
            { stars: 25, name: '25 estrellas', emoji: '🥈' },
            { stars: 50, name: '50 estrellas', emoji: '🥇' },
            { stars: 100, name: '100 estrellas', emoji: '💎' },
            { stars: 200, name: '200 estrellas', emoji: '👑' }
        ];
        function getTotalStars() {
            return parseInt(localStorage.getItem('samuel_total_stars') || '0', 10) || 0;
        }
        function addTotalStars(n) {
            const total = getTotalStars() + (n || 0);
            try { localStorage.setItem('samuel_total_stars', String(total)); } catch (e) {}
            return total;
        }
        function getLevel(total) {
            let current = LEVELS[0];
            for (const lvl of LEVELS) { if (total >= lvl.min) current = lvl; }
            return current;
        }
        function updateLevelUI() {
            const el = document.getElementById('levelBadge');
            if (!el) return;
            const lvl = getLevel(getTotalStars());
            el.innerText = lvl.emoji + ' ' + lvl.name;
        }

        function addStars(n, missionKey) {
            const p = loadProgress();
            p.stars += n;
            if (missionKey) p[missionKey] = true;
            saveProgress(p);
            addTotalStars(n);
            updateMissionUI();
            updateLevelUI();
            pulseStars();
            spawnFloatingStar(n);
            playStarSound();
        }

        // Sonido "ding" suave al ganar una estrella (distinto del tap normal)
        function playStarSound() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                [660, 880].forEach((freq, i) => {
                    const t0 = context.currentTime + i * 0.09;
                    const osc = context.createOscillator();
                    const gain = context.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, t0);
                    gain.gain.setValueAtTime(0.001, t0);
                    gain.gain.exponentialRampToValueAtTime(0.12, t0 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
                    osc.connect(gain);
                    gain.connect(context.destination);
                    osc.start(t0);
                    osc.stop(t0 + 0.2);
                });
            } catch (e) {}
        }

        // Estrella flotante visual cerca del contador al ganar puntos
        function spawnFloatingStar(n) {
            const badge = document.getElementById('starsBadge');
            if (!badge) return;
            const rect = badge.getBoundingClientRect();
            const star = document.createElement('div');
            star.className = 'floating-star';
            star.innerText = `+${n} ⭐`;
            star.style.left = (rect.left + rect.width / 2) + 'px';
            star.style.top = rect.top + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 1150);
        }

        // Detecta cambio de actividad (variedad = +2 estrellas, suma a la misión "Aprender")
        // notify=false evita superponer el audio "cambiar de actividad" con otro audio que ya se va a reproducir
        function registerActivity(name, notify = true) {
            const last = localStorage.getItem('samuel_last_activity');
            if (last && last !== name) {
                addStars(2, 'aprender');
                if (notify) playParentAudio('cambiarActividad');
            }
            localStorage.setItem('samuel_last_activity', name);
        }

        function updateMissionUI() {
            const p = loadProgress();
            const setItem = (id, done, label) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.innerText = (done ? '✅ ' : '⬜ ') + label;
                el.classList.toggle('done', done);
            };
            setItem('mission-jugar', p.jugar, 'Jugar');
            setItem('mission-hablar', p.hablar, 'Hablar');
            setItem('mission-aprender', p.aprender, 'Aprender');

            const badge = document.getElementById('starsBadge');
            if (badge) {
                const shown = p.stars > 0 ? '⭐'.repeat(Math.min(p.stars, 8)) + (p.stars > 8 ? ` +${p.stars - 8}` : '') : '⭐ 0';
                badge.innerText = shown;
            }
        }

        function pulseStars() {
            const badge = document.getElementById('starsBadge');
            if (!badge) return;
            badge.classList.add('pulse-stars');
            setTimeout(() => badge.classList.remove('pulse-stars'), 300);
        }

        // --- Voz sintetizada (sin lógica de puntos, uso interno) ---
        function speak(text, emoji) {
            document.getElementById('lastText').innerText = text;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9; // Un poco más lento para mejor comprensión
            utterance.pitch = 1.2; // Tono más infantil/amigable
            window.speechSynthesis.speak(utterance);

            if (emoji) {
                // Flash visual al hablar
                document.querySelector('.avatar').innerText = emoji;
                setTimeout(() => document.querySelector('.avatar').innerText = '👦', 2000);
            }
        }

        // --- Frase elegida por Samuel (suma estrella + registra actividad) ---
        function say(text, emoji) {
            playTapSound();
            registerActivity('hablar');
            addStars(1, 'hablar');
            try { localStorage.setItem('samuel_last_phrase', text); } catch (e) { /* ignore */ }
            speak(text, emoji);
        }

        // --- Audios Parentales Grabados ---
        // Reproduce un audio grabado por los papás (audio/<nombreArchivo>.mp3).
        // Si el archivo no existe, falla en silencio y usa voz sintetizada de respaldo.
        function playParentAudio(type) {
            const audioPath = parentalAudios[type];
            if (!audioPath) return;
            try {
                const audio = new Audio(audioPath);
                audio.play().catch(() => {
                    const fallback = parentalFallbackTexts[type];
                    if (fallback) speak(fallback);
                });
            } catch (e) {
                const fallback = parentalFallbackTexts[type];
                if (fallback) speak(fallback);
            }
        }

        // Alias de compatibilidad (nombre usado en fases anteriores)
        function playParentalAudio(type) {
            playParentAudio(type);
        }

        // Botón "Ayuda": tap + aviso a los papás, sin disparar el audio de "cambiar de actividad"
        function handleAyuda() {
            playTapSound();
            registerActivity('ayuda', false);
            playParentAudio('ayuda');
        }

        // --- Navegación y Timer ---
        function navigate(url) {
            playTapSound();
            if (url === 'juegos.html') {
                registerActivity('jugar');
                addStars(1, 'jugar');
            }
            setTimeout(() => {
                window.location.href = url;
            }, 200);
        }

        function startVideoTimer() {
            // Guardamos en localStorage el inicio de la sesión de video
            localStorage.setItem('video_start_time', Date.now());
            registerActivity('videos');
            navigate('youtube.html');
        }

        // Chequeo de tiempo (se ejecuta al cargar esta home)
        function checkVideoLimit() {
            const startTime = localStorage.getItem('video_start_time');
            if (startTime) {
                const limit = 30 * 60 * 1000; // 30 minutos
                const elapsed = Date.now() - startTime;

                if (elapsed >= limit) {
                    localStorage.removeItem('video_start_time');
                    playParentAudio('tiempoVideos');
                    // Pequeña pausa para que se escuche el audio antes de mostrar el mensaje
                    setTimeout(showVideoLimitModal, 600);
                }
            }
        }

        // --- Modal de transición amable al terminar el tiempo de videos ---
        function showVideoLimitModal() {
            document.getElementById('videoLimitModal').style.display = 'flex';
        }

        function closeVideoLimitModal() {
            document.getElementById('videoLimitModal').style.display = 'none';
        }

        // --- Modal Hablar ---
        function openHablar() {
            playTapSound();
            document.getElementById('speakModal').style.display = 'grid';
        }

        function closeHablar() {
            document.getElementById('speakModal').style.display = 'none';
        }

        // --- Gate Zona de Papás (cuenta matemática anti-niño) ---
        let gateAnswer = null;

        function openGate() {
            playTapSound();
            const a = 2 + Math.floor(Math.random() * 8);
            const b = 2 + Math.floor(Math.random() * 8);
            gateAnswer = a * b;
            document.getElementById('gateQuestion').innerText = `¿Cuánto es ${a}×${b}?`;
            document.getElementById('gateInput').value = '';
            document.getElementById('gateMsg').innerText = '';
            document.getElementById('gateModal').style.display = 'flex';
            setTimeout(() => document.getElementById('gateInput').focus(), 100);
        }

        function closeGate() {
            document.getElementById('gateModal').style.display = 'none';
        }

        function checkGate() {
            const input = document.getElementById('gateInput');
            const val = parseInt(input.value, 10);
            if (val === gateAnswer) {
                window.location.href = 'adult.html';
            } else {
                document.getElementById('gateMsg').innerText = 'Respuesta incorrecta, probá de nuevo.';
                input.value = '';
                input.focus();
            }
        }

        // Permitir Enter para confirmar el gate
        document.addEventListener('DOMContentLoaded', () => {
            const gateInput = document.getElementById('gateInput');
            if (gateInput) {
                gateInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') checkGate();
                });
            }
        });

        // --- Kiosco / Pantalla Completa ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // --- Inicialización ---
        window.onload = () => {
            updateMissionUI();
            updateLevelUI();
            checkVideoLimit();
            try {
                const lastPhrase = localStorage.getItem('samuel_last_phrase');
                if (lastPhrase) document.getElementById('lastText').innerText = lastPhrase;
            } catch (e) { /* ignore */ }
            // Audio de bienvenida después de una pequeña interacción o carga
            setTimeout(() => {
                playParentAudio('bienvenido');
            }, 1000);
        };
    </script>
</body>
</html>
