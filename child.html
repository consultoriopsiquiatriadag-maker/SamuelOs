<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAMUEL OS - Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F5F7FF;
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --color-jugar: #7C83FD;
            --color-videos: #FF7A7A;
            --color-hablar: #5CC8FF;
            --color-ayuda: #7ED957;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-card: 0 20px 40px rgba(0,0,0,0.1);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at top right, #ffffff, #F5F7FF);
        }

        /* --- Header --- */
        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeInDown 0.8s ease-out;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--color-hablar), var(--color-jugar));
            border: 4px solid white;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        h1 {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--text-color);
        }

        /* --- Grid Principal --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 25px;
            padding: 10px 40px 30px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.03) translateY(-5px);
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-icon {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        .card-label {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Colores Específicos */
        .card-jugar { border-bottom: 12px solid var(--color-jugar); color: var(--color-jugar); }
        .card-videos { border-bottom: 12px solid var(--color-videos); color: var(--color-videos); }
        .card-hablar { border-bottom: 12px solid var(--color-hablar); color: var(--color-hablar); }
        .card-ayuda { border-bottom: 12px solid var(--color-ayuda); color: var(--color-ayuda); }

        /* --- Footer --- */
        footer {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .last-phrase {
            background: white;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-parents {
            background: #EEE;
            color: #999;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-parents:hover { background: #E2E2E2; color: #666; }

        /* --- Modal Hablar --- */
        #speakModal {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 40px;
            z-index: 100;
            animation: zoomIn 0.3s ease-out;
        }

        .phrase-btn {
            background: white;
            border: 4px solid var(--color-hablar);
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: var(--shadow-soft);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
        }

        /* --- Modal Gate (Zona de Papás) --- */
        #gateModal {
            position: fixed;
            inset: 0;
            background: rgba(20,20,30,0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: zoomIn 0.2s ease-out;
        }

        .gate-box {
            background: white;
            border-radius: 30px;
            padding: 35px 30px;
            width: min(380px, 90vw);
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .gate-box p {
            font-weight: 700;
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .gate-question {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 18px;
        }

        .gate-input {
            width: 100%;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            padding: 12px;
            border-radius: 16px;
            border: 3px solid #DDE3F5;
            margin-bottom: 14px;
        }

        .gate-input:focus { outline: none; border-color: var(--color-hablar); }

        .gate-msg {
            color: #ff4757;
            font-weight: 700;
            font-size: 0.85rem;
            min-height: 18px;
            margin-bottom: 10px;
        }

        .gate-actions {
            display: flex;
            gap: 10px;
        }

        .gate-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
        }

        .gate-cancel { background: #EEE; color: #777; }
        .gate-ok { background: var(--color-hablar); color: white; }

        /* --- Animaciones --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsivo para tablets/kioscos */
        @media (max-width: 768px) {
            .card-icon { font-size: 50px; }
            .card-label { font-size: 1.2rem; }
            main { padding: 10px 20px 20px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <div class="avatar">👦</div>
            <h1>Hola, Samuel</h1>
        </div>
        <button onclick="toggleFullscreen()" class="btn-parents">📺 Pantalla Completa</button>
    </header>

    <main>
        <button class="card card-jugar" onclick="navigate('juegos.html')">
            <span class="card-icon">🎮</span>
            <span class="card-label">Jugar</span>
        </button>

        <button class="card card-videos" onclick="startVideoTimer()">
            <span class="card-icon">▶️</span>
            <span class="card-label">Videos</span>
        </button>

        <button class="card card-hablar" onclick="openHablar()">
            <span class="card-icon">🗣️</span>
            <span class="card-label">Hablar</span>
        </button>

        <button class="card card-ayuda" onclick="playParentalAudio('ayuda')">
            <span class="card-icon">❤️</span>
            <span class="card-label">Ayuda</span>
        </button>
    </main>

    <footer>
        <div class="last-phrase" id="status-bar">
            <span>⭐</span> <span id="lastText">¡Listo para empezar!</span>
        </div>
        <button onclick="openGate()" class="btn-parents">Zona de Papás</button>
    </footer>

    <div id="speakModal">
        <button class="close-modal" onclick="closeHablar()">X CERRAR</button>
        <button class="phrase-btn" onclick="say('Quiero agua', '💧')">💧 Quiero agua</button>
        <button class="phrase-btn" onclick="say('Tengo sueño', '😴')">😴 Tengo sueño</button>
        <button class="phrase-btn" onclick="say('Quiero jugar', '🧸')">🧸 Quiero jugar</button>
        <button class="phrase-btn" onclick="say('Te quiero mucho', '💖')">💖 Te quiero</button>
    </div>

    <div id="gateModal">
        <div class="gate-box">
            <p>Pregunta para grandes 🤓</p>
            <div class="gate-question" id="gateQuestion">¿Cuánto es 3×4?</div>
            <input type="number" inputmode="numeric" class="gate-input" id="gateInput" placeholder="Tu respuesta">
            <div class="gate-msg" id="gateMsg"></div>
            <div class="gate-actions">
                <button class="gate-cancel" onclick="closeGate()">Cancelar</button>
                <button class="gate-ok" onclick="checkGate()">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Audios Parentales
        const parentalAudios = {
            bienvenido: 'audio/bienvenido.mp3',
            tiempoVideos: 'audio/tiempo-videos.mp3',
            ayuda: 'audio/ayuda.mp3'
        };

        // --- Sistema de Sonido (WebAudio API Simulado con Audio) ---
        function playTapSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gain = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, context.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            oscillator.connect(gain);
            gain.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        // --- Reproductor de Voz ---
        function say(text, emoji) {
            playTapSound();
            document.getElementById('lastText').innerText = text;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9; // Un poco más lento para mejor comprensión
            utterance.pitch = 1.2; // Tono más infantil/amigable
            window.speechSynthesis.speak(utterance);

            if(emoji) {
                // Flash visual al hablar
                document.querySelector('.avatar').innerText = emoji;
                setTimeout(() => document.querySelector('.avatar').innerText = '👦', 2000);
            }
        }

        // --- Audios Grabados (Parentales) ---
        function playParentalAudio(type) {
            playTapSound();
            const audioPath = parentalAudios[type];
            const audio = new Audio(audioPath);
            
            audio.play().catch(e => {
                console.log("Audio file not found, using synthesis fallback");
                const fallbackTexts = {
                    bienvenido: "¡Hola Samuel! Qué bueno verte.",
                    tiempoVideos: "Samuel, ya pasaste mucho tiempo mirando videos. Ahora vamos a cambiar de actividad.",
                    ayuda: "Mamá y Papá ya vienen a ayudarte."
                };
                say(fallbackTexts[type]);
            });
        }

        // --- Navegación y Timer ---
        function navigate(url) {
            playTapSound();
            setTimeout(() => {
                window.location.href = url;
            }, 200);
        }

        function startVideoTimer() {
            // Guardamos en localStorage el inicio de la sesión de video
            localStorage.setItem('video_start_time', Date.now());
            navigate('youtube.html');
        }

        // Chequeo de tiempo (se ejecuta al cargar esta home)
        function checkVideoLimit() {
            const startTime = localStorage.getItem('video_start_time');
            if (startTime) {
                const limit = 30 * 60 * 1000; // 30 minutos
                const elapsed = Date.now() - startTime;
                
                if (elapsed >= limit) {
                    localStorage.removeItem('video_start_time');
                    playParentalAudio('tiempoVideos');
                }
            }
        }

        // --- Modal Hablar ---
        function openHablar() {
            playTapSound();
            document.getElementById('speakModal').style.display = 'grid';
        }

        function closeHablar() {
            document.getElementById('speakModal').style.display = 'none';
        }

        // --- Gate Zona de Papás (cuenta matemática anti-niño) ---
        let gateAnswer = null;

        function openGate() {
            playTapSound();
            const a = 2 + Math.floor(Math.random() * 8);
            const b = 2 + Math.floor(Math.random() * 8);
            gateAnswer = a * b;
            document.getElementById('gateQuestion').innerText = `¿Cuánto es ${a}×${b}?`;
            document.getElementById('gateInput').value = '';
            document.getElementById('gateMsg').innerText = '';
            document.getElementById('gateModal').style.display = 'flex';
            setTimeout(() => document.getElementById('gateInput').focus(), 100);
        }

        function closeGate() {
            document.getElementById('gateModal').style.display = 'none';
        }

        function checkGate() {
            const input = document.getElementById('gateInput');
            const val = parseInt(input.value, 10);
            if (val === gateAnswer) {
                window.location.href = 'adult.html';
            } else {
                document.getElementById('gateMsg').innerText = 'Respuesta incorrecta, probá de nuevo.';
                input.value = '';
                input.focus();
            }
        }

        // Permitir Enter para confirmar el gate
        document.addEventListener('DOMContentLoaded', () => {
            const gateInput = document.getElementById('gateInput');
            if (gateInput) {
                gateInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') checkGate();
                });
            }
        });

        // --- Kiosco / Pantalla Completa ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // --- Inicialización ---
        window.onload = () => {
            checkVideoLimit();
            // Audio de bienvenida después de una pequeña interacción o carga
            setTimeout(() => {
                playParentalAudio('bienvenido');
            }, 1000);
        };
    </script>
</body>
</html>
